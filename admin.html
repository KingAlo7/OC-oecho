<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OC Referenz — Admin</title>
<script src="https://unpkg.com/smiles-drawer@2/dist/smiles-drawer.min.js"></script>
<script src="./reaction-drawer.js"></script>
<style>
:root{
  --bg:#0f1117;--surface:#181b26;--surface2:#1e2235;
  --border:#252838;--border2:#2e3350;
  --accent:#6c8ef7;--accent2:#a78bfa;
  --text:#e2e4f0;--muted:#7a7f9a;--muted2:#5a5f7a;
  --green:#4ade80;--red:#f87171;--yellow:#fbbf24;--orange:#f59e0b;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;height:52px;display:flex;align-items:center;gap:0.75rem;flex-shrink:0;}
.logo{font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.badge-local{font-size:0.68rem;background:#2a1a00;color:var(--orange);border:1px solid var(--orange);border-radius:20px;padding:0.15rem 0.55rem;}
.hnav{margin-left:auto;display:flex;gap:0.4rem;}
.hnav a{color:var(--muted);text-decoration:none;font-size:0.82rem;padding:0.28rem 0.65rem;border-radius:6px;border:1px solid var(--border);}
.hnav a:hover{color:var(--text);border-color:var(--border2);}

.tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;flex-shrink:0;}
.tab-btn{padding:0.6rem 1rem;font-size:0.84rem;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;display:flex;align-items:center;gap:0.35rem;transition:color 0.15s;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tbadge{font-size:0.65rem;background:var(--border2);color:var(--muted);border-radius:20px;padding:0.08rem 0.38rem;}
.tbadge.warn{background:#2a1a00;color:var(--orange);}

.app-body{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.tab-pane{display:none;flex:1;overflow:hidden;}
.tab-pane.active{display:flex;}

.split{display:flex;flex:1;overflow:hidden;}
.list-panel{width:270px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.edit-scroll{flex:1;overflow-y:auto;padding:1.5rem 2rem 3rem;}
.edit-scroll::-webkit-scrollbar{width:4px;}
.edit-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

.list-top{padding:0.65rem;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:0.45rem;flex-shrink:0;}
.search-box{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border2);border-radius:7px;padding:0.35rem 0.65rem;font-size:0.82rem;}
.search-box:focus{outline:none;border-color:var(--accent);}
.list-actions{display:flex;gap:0.35rem;}
.bxs{font-size:0.74rem;padding:0.28rem 0.6rem;border-radius:6px;border:none;cursor:pointer;font-weight:600;background:var(--accent);color:#fff;}
.bxs.sec{background:var(--surface2);color:var(--text);border:1px solid var(--border2);}
.bxs:hover{opacity:0.83;}

.list-scroll{flex:1;overflow-y:auto;}
.list-scroll::-webkit-scrollbar{width:3px;}
.list-scroll::-webkit-scrollbar-thumb{background:var(--border2);}
.cat-hdr{padding:0.45rem 0.75rem;font-size:0.67rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted2);border-top:1px solid var(--border);display:flex;justify-content:space-between;}
.rxn-row{padding:0.42rem 0.85rem;font-size:0.82rem;cursor:pointer;border-left:2px solid transparent;color:var(--muted);transition:all 0.12s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rxn-row:hover{background:var(--surface2);color:var(--text);}
.rxn-row.active{color:var(--accent);border-left-color:var(--accent);background:#1a1f38;}

.empty-hint{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:0.65rem;}
.empty-hint .ico{font-size:2.5rem;opacity:0.25;}
.fsec{margin-bottom:1.75rem;}
.fsec-title{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent);margin-bottom:0.9rem;display:flex;align-items:center;gap:0.5rem;}
.fsec-title::after{content:'';flex:1;height:1px;background:var(--border);}
.field{margin-bottom:0.7rem;}
.field label{display:block;font-size:0.74rem;color:var(--muted);margin-bottom:0.28rem;font-weight:500;}
.fi{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border2);border-radius:7px;padding:0.42rem 0.65rem;font-size:0.84rem;font-family:inherit;}
.fi:focus{outline:none;border-color:var(--accent);}
textarea.fi{resize:vertical;min-height:60px;line-height:1.5;}
select.fi option{background:var(--surface);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:0.7rem;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.7rem;}

.tags-wrap{display:flex;flex-wrap:wrap;gap:0.3rem;padding:0.38rem 0.55rem;background:var(--bg);border:1px solid var(--border2);border-radius:7px;min-height:36px;align-items:center;cursor:text;}
.tags-wrap:focus-within{border-color:var(--accent);}
.chip{display:inline-flex;align-items:center;gap:0.2rem;font-size:0.71rem;padding:0.13rem 0.48rem;border-radius:20px;background:var(--surface2);color:var(--muted);border:1px solid var(--border2);}
.chip button{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:0.68rem;padding:0;line-height:1;}
.chip button:hover{color:var(--red);}
.tag-inp{border:none;background:none;color:var(--text);font-size:0.81rem;outline:none;flex:1;min-width:60px;padding:0;}

.kp-list{display:flex;flex-direction:column;gap:0.35rem;margin-bottom:0.45rem;}
.kp-row{display:flex;gap:0.35rem;}
.kp-row input{flex:1;background:var(--bg);color:var(--text);border:1px solid var(--border2);border-radius:7px;padding:0.38rem 0.6rem;font-size:0.83rem;font-family:inherit;}
.kp-row input:focus{outline:none;border-color:var(--accent);}
.kp-del{background:none;border:1px solid var(--border);color:var(--muted2);padding:0.3rem 0.45rem;border-radius:6px;cursor:pointer;font-size:0.72rem;flex-shrink:0;}
.kp-del:hover{color:var(--red);border-color:var(--red);}

.smi-prev{background:#0c0e16;border:1px solid var(--border);border-radius:8px;padding:1rem;min-height:90px;display:flex;align-items:center;justify-content:center;margin-top:0.45rem;overflow-x:auto;}
.smi-ph{font-size:0.78rem;color:var(--muted2);font-style:italic;}

.act-bar{display:flex;gap:0.45rem;padding:1rem 0 0.5rem;border-top:1px solid var(--border);margin-top:0.75rem;flex-wrap:wrap;}
.btn{padding:0.45rem 1rem;border-radius:8px;border:none;cursor:pointer;font-size:0.84rem;font-weight:600;transition:opacity 0.15s;}
.btn-pri{background:var(--accent);color:#fff;}
.btn-sec{background:var(--surface2);color:var(--text);border:1px solid var(--border2);}
.btn-del{background:#3d0c0c;color:var(--red);border:1px solid #7f1d1d;}
.btn:hover:not(:disabled){opacity:0.82;}
.btn:disabled{opacity:0.38;cursor:default;}

.commit-wrap{flex:1;overflow-y:auto;padding:1.5rem 2rem;max-width:820px;}
.commit-wrap::-webkit-scrollbar{width:4px;}
.commit-wrap::-webkit-scrollbar-thumb{background:var(--border2);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem;margin-bottom:1.2rem;}
.card-hdr{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;}
.sdot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}
.sdot-grey{background:var(--muted2);}.sdot-green{background:var(--green);}.sdot-orange{background:var(--orange);}.sdot-red{background:var(--red);}
.conn-row{display:flex;align-items:center;gap:0.4rem;font-size:0.75rem;}

.fstat-row{display:flex;align-items:center;gap:0.65rem;padding:0.55rem 0;border-bottom:1px solid var(--border);font-size:0.84rem;}
.fstat-row:last-child{border-bottom:none;}
.fstat-name{font-family:monospace;flex:1;}
.fstat-info{font-size:0.73rem;color:var(--muted);}
.slabel{font-size:0.7rem;padding:0.13rem 0.48rem;border-radius:20px;font-weight:600;}
.slabel-ok{background:#0d2718;color:var(--green);}.slabel-mod{background:#2a1a00;color:var(--orange);}.slabel-unk{background:var(--surface2);color:var(--muted2);}

.cf-row{display:flex;align-items:center;gap:0.55rem;font-size:0.84rem;padding:0.35rem 0;}
.cf-row input[type=checkbox]{width:auto;accent-color:var(--accent);}

.clog{display:flex;flex-direction:column;}
.centry{display:flex;align-items:center;gap:0.65rem;padding:0.58rem 0;border-bottom:1px solid var(--border);}
.centry:last-child{border-bottom:none;}
.csha{font-family:monospace;font-size:0.73rem;color:var(--accent);background:var(--surface2);padding:0.13rem 0.38rem;border-radius:4px;text-decoration:none;flex-shrink:0;}
.csha:hover{color:var(--accent2);}
.cmsg{font-size:0.83rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cmeta{font-size:0.71rem;color:var(--muted);flex-shrink:0;}

.toast{position:fixed;bottom:1.4rem;right:1.4rem;padding:0.65rem 1.1rem;border-radius:8px;font-size:0.83rem;opacity:0;transition:opacity 0.25s;pointer-events:none;z-index:100;}
.toast.show{opacity:1;}
.toast.ok{background:#1e2d1e;color:var(--green);border:1px solid var(--green);}
.toast.err{background:#2d1e1e;color:var(--red);border:1px solid var(--red);}
.spin{display:inline-block;width:13px;height:13px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:rot 0.7s linear infinite;vertical-align:middle;}
@keyframes rot{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<header>
  <div class="logo">⚗ OC Referenz — Admin</div>
  <span class="badge-local">nur lokal</span>
  <div class="hnav">
    <a href="/">Referenz</a>
    <a href="/export.html">Export</a>
  </div>
</header>

<div class="tab-bar">
  <button class="tab-btn active" id="tbtn-reactions" onclick="switchTab('reactions')">
    ⚗ Reaktionen <span class="tbadge" id="badge-count">—</span>
  </button>
  <button class="tab-btn" id="tbtn-commit" onclick="switchTab('commit')">
    ↑ Commit <span class="tbadge warn" id="badge-unsaved" style="display:none">ungespeichert</span>
  </button>
</div>

<div class="app-body">

  <!-- REAKTIONEN -->
  <div class="tab-pane active" id="tab-reactions">
    <div class="split">
      <div class="list-panel">
        <div class="list-top">
          <input class="search-box" type="text" id="rxn-search" placeholder="Suchen…" oninput="renderList(this.value)">
          <div class="list-actions">
            <button class="bxs" onclick="newRxn()">＋ Neu</button>
            <button class="bxs sec" onclick="dupRxn()">Kop.</button>
            <button class="bxs sec" onclick="importRxn()">Import</button>
          </div>
        </div>
        <div class="list-scroll" id="rxn-list"></div>
      </div>
      <div class="edit-scroll" id="edit-panel">
        <div class="empty-hint"><div class="ico">⚗</div><div>Reaktion zum Bearbeiten auswählen</div></div>
      </div>
    </div>
  </div>

  <!-- COMMIT -->
  <div class="tab-pane" id="tab-commit">
    <div class="commit-wrap">

      <div class="card">
        <div class="card-hdr">
          <span>GitHub Konfiguration</span>
          <span class="conn-row"><span class="sdot sdot-grey" id="conn-dot"></span><span id="conn-text">Nicht konfiguriert</span></span>
        </div>
        <div class="row2">
          <div class="field"><label>Owner</label><input class="fi" id="gh-owner" placeholder="KingAlo7"></div>
          <div class="field"><label>Repository</label><input class="fi" id="gh-repo" placeholder="OC-oecho"></div>
        </div>
        <div class="field"><label>Personal Access Token <small style="color:var(--muted2)">(gespeichert in Browser-localStorage)</small></label>
          <input class="fi" id="gh-pat" type="password" placeholder="ghp_…" autocomplete="off">
        </div>
        <div style="display:flex;gap:0.45rem;margin-top:0.75rem;align-items:center">
          <button class="btn btn-pri" onclick="saveGhCfg()">Konfiguration speichern</button>
          <button class="btn btn-sec" onclick="testConn()">Verbindung testen</button>
          <span id="conn-res" style="font-size:0.8rem;color:var(--muted);margin-left:0.3rem"></span>
        </div>
      </div>

      <div class="card">
        <div class="card-hdr"><span>Dateistatus</span><button class="bxs sec" onclick="refreshStatus()">Aktualisieren</button></div>
        <div class="fstat-row">
          <span class="sdot sdot-grey" id="dot-r"></span>
          <span class="fstat-name">data/reactions.json</span>
          <span class="fstat-info" id="info-r">—</span>
          <span class="slabel slabel-unk" id="lbl-r">unbekannt</span>
        </div>
      </div>

      <div class="card">
        <div class="card-hdr">Commit &amp; Push nach main</div>
        <label class="cf-row" style="margin-bottom:0.75rem">
          <input type="checkbox" id="ci-r" checked>
          <span>data/reactions.json</span>
        </label>
        <div class="field"><label>Commit-Nachricht</label>
          <input class="fi" id="commit-msg" placeholder="data: Reaktionen aktualisiert">
        </div>
        <div style="display:flex;align-items:center;gap:0.65rem;margin-top:0.75rem">
          <button class="btn btn-pri" id="commit-btn" onclick="doCommit()">Commit &amp; Push</button>
          <span id="commit-res" style="font-size:0.8rem;color:var(--muted)"></span>
        </div>
      </div>

      <div class="card">
        <div class="card-hdr"><span>Letzte Commits — data/</span><button class="bxs sec" onclick="loadHistory()">Laden</button></div>
        <div class="clog" id="clog"><div style="color:var(--muted);font-size:0.82rem">„Laden“ klicken, um Commit-Verlauf abzurufen.</div></div>
      </div>

    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
let reactions = [], selRxn = null, unsaved = false;
let shas = { r: null };
let serverMode = false; // true when node server.js is running

async function init() {
  try {
    // Try local API first (requires node server.js)
    reactions = await fetch('/api/reactions').then(r => { if(!r.ok) throw 0; return r.json(); });
    serverMode = true;
  } catch {
    // Fall back to static file — read-only mode (GitHub commit still works)
    try {
      reactions = await fetch('./data/reactions.json').then(r => { if(!r.ok) throw 0; return r.json(); });
      toast('Nur-Lesen-Modus: Server nicht aktiv. Zum lokalen Bearbeiten: node server.js', 'err');
    } catch {
      toast('reactions.json konnte nicht geladen werden', 'err');
    }
  }
  renderList(); setBadge(); loadGhCfg();
}

function switchTab(n) {
  ['reactions','commit'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===n);
    document.getElementById('tbtn-'+t).classList.toggle('active', t===n);
  });
}

/* ─ Liste ────────────────────────────────────────────── */
function renderList(q='') {
  const f = q.toLowerCase();
  const cats = [...new Set(reactions.map(r => r.category))].sort();
  document.getElementById('rxn-list').innerHTML = cats.map(cat => {
    const items = reactions.map((r,i)=>({r,i})).filter(({r}) =>
      r.category===cat && (!f || r.name.toLowerCase().includes(f)
        || (r.tags||[]).some(t=>t.toLowerCase().includes(f))
        || (r.id||'').toLowerCase().includes(f)));
    if (!items.length) return '';
    return `<div class="cat-hdr">${x(cat)} <span>${items.length}</span></div>`
      + items.map(({r,i}) =>
        `<div class="rxn-row${selRxn===i?' active':''}" onclick="selFn(${i})">${x(r.name)}</div>`
      ).join('');
  }).join('') || '<div style="padding:1rem;color:var(--muted);font-size:0.81rem">Keine Treffer</div>';
}
function setBadge() {
  document.getElementById('badge-count').textContent = reactions.length;
  document.getElementById('badge-unsaved').style.display = unsaved ? '' : 'none';
}

/* ─ Editor ──────────────────────────────────────────── */
function selFn(i) { selRxn=i; renderList(document.getElementById('rxn-search').value); buildForm(reactions[i]); }

function buildForm(r) {
  const cats = [...new Set(reactions.map(rx => rx.category))].sort();
  const catOpts = cats.map(c =>
    `<option value="${x(c)}"${r.category===c?' selected':''}>${x(c)}</option>`
  ).join('') + `<option value="__new__">— Neue Kategorie —</option>`;

  document.getElementById('edit-panel').innerHTML = `
  <div class="fsec">
    <div class="fsec-title">Identität</div>
    <div class="row2">
      <div class="field"><label>ID <small style="color:var(--muted2)">(eindeutiger Slug)</small></label>
        <input class="fi" id="f-id" value="${x(r.id)}" oninput="mu()"></div>
      <div class="field"><label>Reaktionstyp</label>
        <input class="fi" id="f-rtyp" placeholder="SN1, E2, AN…" value="${x(r.reaktionstyp||'')}" oninput="mu()"></div>
    </div>
    <div class="field"><label>Name</label>
      <input class="fi" id="f-name" value="${x(r.name)}" oninput="mu()"></div>
    <div class="row2">
      <div class="field"><label>Untertitel</label>
        <input class="fi" id="f-sub" value="${x(r.subtitle||'')}" oninput="mu()"></div>
      <div class="field"><label>Transformation</label>
        <input class="fi" id="f-trans" value="${x(r.transformation||'')}" placeholder="R-X → R-OH" oninput="mu()"></div>
    </div>
    <div class="field"><label>Kategorie</label>
      <select class="fi" id="f-cat" onchange="catToggle(this)">${catOpts}</select>
      <input class="fi" id="f-cat-new" placeholder="Neue Kategorie eingeben…" style="display:none;margin-top:0.35rem" oninput="mu()">
    </div>
    <div class="field"><label>Tags <small style="color:var(--muted2)">(Enter oder Komma)</small></label>
      <div class="tags-wrap" id="tags-wrap" onclick="document.getElementById('ti').focus()">
        ${(r.tags||[]).map(t=>`<span class="chip">${x(t)}<button onclick="rmTag('${x(t)}')">x</button></span>`).join('')}
        <input class="tag-inp" id="ti" placeholder="Tag…" onkeydown="tagKey(event)">
      </div></div>
  </div>

  <div class="fsec">
    <div class="fsec-title">Struktur</div>
    <div class="field"><label>Reaktions-SMILES <small style="color:var(--muted2)">Reaktanten&gt;Reagenz&gt;Produkte</small></label>
      <input class="fi" id="f-smi" value="${x(r.reaction_smiles||'')}" placeholder="CC(C)(C)Br&gt;H2O&gt;CC(C)(C)OH" oninput="mu();schedP()">
    </div>
    <div class="smi-prev" id="smi-prev"><div class="smi-ph">SMILES oben eingeben zur Vorschau</div></div>
    <div class="row2" style="margin-top:0.7rem">
      <div class="field"><label>Reagenzbeschriftung <small style="color:var(--muted2)">(über Pfeil)</small></label>
        <input class="fi" id="f-rl" value="${x(r.reagent_label||'')}" placeholder="KOtBu / THF" oninput="mu();schedP()"></div>
      <div class="field"><label>Allgemeines Schema <small style="color:var(--muted2)">(Textfallback)</small></label>
        <input class="fi" id="f-gs" value="${x(r.general_scheme||'')}" placeholder="R-X → R-OH" oninput="mu()"></div>
    </div>
  </div>

  <div class="fsec">
    <div class="fsec-title">Bedingungen &amp; Umfang</div>
    <div class="field"><label>Bedingungen</label><textarea class="fi" id="f-cond" oninput="mu()">${x(r.conditions||'')}</textarea></div>
    <div class="row3">
      <div class="field"><label>Substratumfang</label><input class="fi" id="f-scope" value="${x(r.substrate_scope||'')}" oninput="mu()"></div>
      <div class="field"><label>Stereochemie</label><input class="fi" id="f-stereo" value="${x(r.stereochemistry||'')}" oninput="mu()"></div>
      <div class="field"><label>Kinetik</label><input class="fi" id="f-kin" value="${x(r.kinetics||'')}" oninput="mu()"></div>
    </div>
    <div class="field"><label>Lösungsmittel</label><input class="fi" id="f-solv" value="${x(r.solvent||'')}" oninput="mu()"></div>
  </div>

  <div class="fsec">
    <div class="fsec-title">Schlüsselpunkte &amp; Notizen</div>
    <div class="kp-list" id="kp-list">${(r.key_points||[]).map((p,i)=>`
      <div class="kp-row"><input value="${x(p)}" oninput="mu()"><button class="kp-del" onclick="rmKP(${i})">x</button></div>`).join('')}
    </div>
    <button class="bxs sec" onclick="addKP()">＋ Schlüsselpunkt</button>
    <div class="field" style="margin-top:0.8rem"><label>Notizen / Synthesekontext</label>
      <textarea class="fi" id="f-notes" style="min-height:80px" oninput="mu()">${x(r.notes||'')}</textarea></div>
  </div>

  <div class="act-bar">
    <button class="btn btn-pri" onclick="saveRxn()">Lokal speichern</button>
    <button class="btn btn-sec" onclick="dupRxn()">Duplizieren</button>
    <button class="btn btn-del" onclick="delRxn()">Löschen</button>
  </div>`;

  if (r.reaction_smiles) drawP(r.reaction_smiles, r.reagent_label);
}

function catToggle(sel) {
  const inp = document.getElementById('f-cat-new');
  if (sel.value === '__new__') { inp.style.display=''; inp.focus(); }
  else inp.style.display='none';
  mu();
}
function getCat() {
  const sel = document.getElementById('f-cat');
  return sel.value === '__new__'
    ? (document.getElementById('f-cat-new').value.trim() || 'Unkategorisiert')
    : sel.value;
}

/* tags */
function getTags() { return [...document.querySelectorAll('#tags-wrap .chip')].map(c=>c.firstChild.textContent.trim()); }
function rmTag(t) { document.querySelectorAll('#tags-wrap .chip').forEach(c=>{ if(c.firstChild.textContent.trim()===t) c.remove(); }); mu(); }
function tagKey(e) {
  if (e.key==='Enter'||e.key===',') {
    e.preventDefault();
    const v=e.target.value.trim().replace(/,$/,'');
    if(v){ const w=document.getElementById('tags-wrap'); const s=document.createElement('span'); s.className='chip'; s.innerHTML=x(v)+`<button onclick="rmTag('${x(v)}')">x</button>`; w.insertBefore(s,e.target); e.target.value=''; mu(); }
  } else if(e.key==='Backspace'&&e.target.value==='') {
    const c=[...document.querySelectorAll('#tags-wrap .chip')]; if(c.length){c[c.length-1].remove();mu();}
  }
}

/* Schlüsselpunkte */
function addKP() { const l=document.getElementById('kp-list'); const i=l.children.length; const d=document.createElement('div'); d.className='kp-row'; d.innerHTML=`<input value="" oninput="mu()"><button class="kp-del" onclick="rmKP(${i})">x</button>`; l.appendChild(d); d.querySelector('input').focus(); mu(); }
function rmKP(i) { document.getElementById('kp-list').children[i]?.remove(); mu(); }
function getKPs() { return [...document.querySelectorAll('#kp-list input')].map(i=>i.value.trim()).filter(Boolean); }

/* SMILES Vorschau */
let pt; function schedP(){clearTimeout(pt);pt=setTimeout(()=>{const s=document.getElementById('f-smi')?.value?.trim();const l=document.getElementById('f-rl')?.value?.trim();if(s)drawP(s,l);else{const b=document.getElementById('smi-prev');if(b)b.innerHTML='<div class="smi-ph">SMILES oben eingeben zur Vorschau</div>';}},500);}
function drawP(smiles,label){const b=document.getElementById('smi-prev');if(!b)return;b.innerHTML='<svg id="psv" xmlns="http://www.w3.org/2000/svg"></svg>';requestAnimationFrame(()=>{const svg=document.getElementById('psv');if(svg)ReactionRenderer.draw(smiles,svg,'dark',label||'{reagents}');});}

/* collect + save */
function collect() {
  const r={}, g=id=>document.getElementById(id)?.value?.trim(), s=(k,v)=>{if(v)r[k]=v;};
  r.id=g('f-id'); r.category=getCat(); r.name=g('f-name');
  s('subtitle',g('f-sub')); s('reaktionstyp',g('f-rtyp')); s('transformation',g('f-trans'));
  r.tags=getTags();
  s('reaction_smiles',g('f-smi')); s('reagent_label',g('f-rl')); s('general_scheme',g('f-gs'));
  s('conditions',g('f-cond')); s('substrate_scope',g('f-scope')); s('stereochemistry',g('f-stereo'));
  s('kinetics',g('f-kin')); s('solvent',g('f-solv'));
  const kps=getKPs(); if(kps.length) r.key_points=kps;
  s('notes',g('f-notes'));
  return r;
}
async function saveRxn() {
  if(selRxn===null)return;
  if(!serverMode){toast('Lokal speichern erfordert node server.js — Commit über GitHub-Tab möglich','err');return;}
  const r=collect();
  if(!r.id||!r.name||!r.category){toast('ID, Name und Kategorie erforderlich','err');return;}
  if(reactions.some((y,i)=>y.id===r.id&&i!==selRxn)){toast('ID bereits vorhanden','err');return;}
  reactions[selRxn]=r;
  await persist(); renderList(document.getElementById('rxn-search').value);
  unsaved=true; setBadge(); toast('Lokal gespeichert ✓');
}
function newRxn(){
  const cats=[...new Set(reactions.map(r=>r.category))];
  const r={id:'neu-'+Date.now(),category:cats[0]||'Unkategorisiert',name:'Neue Reaktion',tags:[]};
  reactions.push(r); selRxn=reactions.length-1; renderList(); buildForm(r); unsaved=true; setBadge();
}
function dupRxn(){
  if(selRxn===null)return;
  const r=JSON.parse(JSON.stringify(reactions[selRxn]));
  r.id+='-kop'; r.name+=' (Kopie)'; reactions.push(r); selRxn=reactions.length-1;
  renderList(); buildForm(r); unsaved=true; setBadge();
}
async function delRxn(){
  if(selRxn===null||!confirm(`"${reactions[selRxn].name}" löschen?`))return;
  if(!serverMode){toast('Löschen erfordert node server.js','err');return;}
  reactions.splice(selRxn,1); selRxn=null;
  await persist(); renderList();
  document.getElementById('edit-panel').innerHTML='<div class="empty-hint"><div class="ico">⚗</div><div>Reaktion zum Bearbeiten auswählen</div></div>';
  unsaved=true; setBadge();
}
function importRxn(){
  const raw=prompt('Reaktions-JSON (Objekt oder Array) einfügen:'); if(!raw)return;
  try{let d=JSON.parse(raw);if(!Array.isArray(d))d=[d];let n=0;d.forEach(r=>{if(r.id&&r.name){reactions.push(r);n++;}});renderList();toast(`${n} Reaktion(en) importiert`);unsaved=true;setBadge();}
  catch(e){toast('JSON-Fehler: '+e.message,'err');}
}
async function persist(){
  if(!serverMode) return; // no-op in read-only mode; GitHub commit is the save path
  const res=await fetch('/api/reactions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(reactions)});
  if(!res.ok)throw new Error('Speichern fehlgeschlagen');
}
function mu(){unsaved=true;setBadge();}

/* ─ GitHub ────────────────────────────────────────────── */
function ghCfg(){return{owner:localStorage.getItem('gh_owner')||'',repo:localStorage.getItem('gh_repo')||'',pat:localStorage.getItem('gh_pat')||''};}
function saveGhCfg(){
  localStorage.setItem('gh_owner',document.getElementById('gh-owner').value.trim());
  localStorage.setItem('gh_repo', document.getElementById('gh-repo').value.trim());
  localStorage.setItem('gh_pat',  document.getElementById('gh-pat').value.trim());
  toast('Konfiguration gespeichert'); setConn('configured');
}
function loadGhCfg(){
  const c=ghCfg();
  document.getElementById('gh-owner').value=c.owner;
  document.getElementById('gh-repo').value=c.repo;
  document.getElementById('gh-pat').value=c.pat;
  if(c.owner&&c.repo&&c.pat)setConn('configured');
}
function setConn(s){
  const dot=document.getElementById('conn-dot'),txt=document.getElementById('conn-text');
  const m={configured:['sdot-orange','Konfiguriert'],connected:['sdot-green','Verbunden'],error:['sdot-red','Fehler']};
  const [cls,lbl]=m[s]||['sdot-grey','Nicht konfiguriert'];
  dot.className='sdot '+cls; txt.textContent=lbl;
}
async function ghFetch(path,opts={}){
  const {pat}=ghCfg(); if(!pat)throw new Error('Kein PAT konfiguriert');
  const res=await fetch(`https://api.github.com${path}`,{...opts,headers:{'Authorization':`Bearer ${pat}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json',...(opts.headers||{})}});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.message||`HTTP ${res.status}`);}
  return res.json();
}
async function testConn(){
  const el=document.getElementById('conn-res'); el.innerHTML='<span class="spin"></span>';
  try{const {owner,repo}=ghCfg();const d=await ghFetch(`/repos/${owner}/${repo}`);el.textContent=`✓ ${d.full_name}`;el.style.color='var(--green)';setConn('connected');}
  catch(e){el.textContent='✗ '+e.message;el.style.color='var(--red)';setConn('error');}
}
async function refreshStatus(){
  const {owner,repo,pat}=ghCfg();if(!pat){toast('GitHub zuerst konfigurieren','err');return;}
  const dot=document.getElementById('dot-r'),info=document.getElementById('info-r'),lbl=document.getElementById('lbl-r');
  try{
    const remote=await ghFetch(`/repos/${owner}/${repo}/contents/data/reactions.json`);
    shas.r=remote.sha;
    const rc=JSON.parse(atob(remote.content.replace(/\n/g,'')));
    const changed=JSON.stringify(reactions)!==JSON.stringify(rc);
    info.textContent=`lokal:${reactions.length} remote:${rc.length}`;
    if(changed){dot.className='sdot sdot-orange';lbl.className='slabel slabel-mod';lbl.textContent='geändert';}
    else{dot.className='sdot sdot-green';lbl.className='slabel slabel-ok';lbl.textContent='aktuell';}
  }catch(e){info.textContent=e.message;lbl.className='slabel slabel-unk';lbl.textContent='Fehler';}
}
async function doCommit(){
  const btn=document.getElementById('commit-btn'),res=document.getElementById('commit-res');
  const msg=document.getElementById('commit-msg').value.trim();
  if(!msg){toast('Commit-Nachricht eingeben','err');return;}
  if(!document.getElementById('ci-r').checked){toast('Mindestens eine Datei auswählen','err');return;}
  btn.disabled=true;btn.innerHTML='<span class="spin"></span> Wird gepusht…';res.textContent='';
  const {owner,repo}=ghCfg();
  try{
    if(!shas.r){const remote=await ghFetch(`/repos/${owner}/${repo}/contents/data/reactions.json`);shas.r=remote.sha;}
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(reactions,null,2))));
    const r=await ghFetch(`/repos/${owner}/${repo}/contents/data/reactions.json`,{method:'PUT',body:JSON.stringify({message:msg,content,sha:shas.r,branch:'main'})});
    shas.r=r.content.sha;
    toast('Erfolgreich gepusht ✓');
    res.textContent='✓ reactions.json committed — Pages wird automatisch neu deployt';
    res.style.color='var(--green)';
    unsaved=false;setBadge();document.getElementById('commit-msg').value='';
    setTimeout(loadHistory,1500);
  }catch(e){
    toast('Commit fehlgeschlagen: '+e.message,'err');
    res.textContent='✗ '+e.message;res.style.color='var(--red)';
  }finally{btn.disabled=false;btn.textContent='Commit & Push';}
}
async function loadHistory(){
  const {owner,repo,pat}=ghCfg();if(!pat){document.getElementById('clog').innerHTML='<div style="color:var(--muted);font-size:0.82rem">GitHub zuerst konfigurieren.</div>';return;}
  const log=document.getElementById('clog');log.innerHTML='<div style="color:var(--muted);font-size:0.82rem"><span class="spin"></span> Lädt…</div>';
  try{
    const commits=await ghFetch(`/repos/${owner}/${repo}/commits?per_page=15&path=data`);
    if(!commits.length){log.innerHTML='<div style="color:var(--muted);font-size:0.82rem">Keine Commits gefunden.</div>';return;}
    log.innerHTML=commits.map(c=>{
      const sha=c.sha.slice(0,7),url=c.html_url,msg=c.commit.message.split('\n')[0];
      const author=c.commit.author.name;
      const d=new Date(c.commit.author.date);
      const date=d.toLocaleDateString('de-AT',{day:'2-digit',month:'2-digit',year:'2-digit'})+' '+d.toLocaleTimeString('de-AT',{hour:'2-digit',minute:'2-digit'});
      return `<div class="centry"><a class="csha" href="${url}" target="_blank">${sha}</a><span class="cmsg" title="${x(msg)}">${x(msg)}</span><span class="cmeta">${x(author)} · ${date}</span></div>`;
    }).join('');
  }catch(e){log.innerHTML=`<div style="color:var(--red);font-size:0.82rem">✗ ${e.message}</div>`;}
}

/* ─ Util ─────────────────────────────────────────────── */
function x(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
let _tt; function toast(msg,type='ok'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),3000);}

init();
</script>
</body>
</html>
