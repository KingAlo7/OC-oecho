<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#c2c5a6">
<title>OC Referenz — Admin</title>
<link rel="icon" type="image/svg+xml" href="./assets/logo.svg">
<script src="https://unpkg.com/smiles-drawer@2/dist/smiles-drawer.min.js"></script>
<script src="./reaction-drawer.js"></script>
<style>
:root{
  --bg:#faf9f5;
  --surface:#ffffff;
  --surface2:#f3f3ec;
  --surface3:#ecebe0;
  --border:#e4e3d8;
  --border2:#cfceb8;
  --text:#1a1a18;
  --text-soft:#3a3a35;
  --muted:#6b6a5d;
  --muted2:#9a9889;
  --accent:#e2001a;
  --accent-soft:#fde4e7;
  --accent2:#ed6b06;
  --sage:#c2c5a6;
  --green:#5a8a2a;
  --green-soft:#eaf4dc;
  --red:#c91020;
  --red-soft:#fde4e7;
  --yellow:#b87a00;
  --yellow-soft:#fff4d6;
  --orange:#ed6b06;
  --orange-soft:#ffe9d6;
  --shadow-sm:0 1px 2px rgba(60,55,40,0.04);
  --shadow-md:0 2px 8px rgba(60,55,40,0.06);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.25rem;height:56px;display:flex;align-items:center;gap:0.85rem;flex-shrink:0;box-shadow:var(--shadow-sm);}
.brand{display:flex;align-items:center;gap:0.6rem;flex-shrink:0;}
.brand-logo{width:30px;height:30px;color:var(--accent);flex-shrink:0;}
.brand-logo svg{width:100%;height:100%;display:block;}
.brand-name{font-size:1.05rem;font-weight:700;color:var(--text);letter-spacing:-0.01em;white-space:nowrap;}
.brand-sub{font-size:0.72rem;font-weight:600;color:var(--accent);letter-spacing:0.04em;text-transform:uppercase;padding:0.15rem 0.45rem;background:var(--accent-soft);border:1px solid var(--accent);border-radius:6px;}
.mode-badge{font-size:0.7rem;font-weight:600;padding:0.18rem 0.55rem;border-radius:20px;border:1px solid var(--border2);background:var(--surface2);color:var(--muted);}
.mode-badge.server{background:var(--green-soft);color:var(--green);border-color:var(--green);}
.mode-badge.browser{background:var(--orange-soft);color:var(--orange);border-color:var(--orange);}
.hnav{margin-left:auto;display:flex;gap:0.45rem;}
.hnav a{color:var(--muted);text-decoration:none;font-size:0.82rem;padding:0.3rem 0.7rem;border-radius:7px;border:1px solid var(--border);transition:all 0.15s;}
.hnav a:hover{color:var(--text);border-color:var(--muted);background:var(--surface2);}

.tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;flex-shrink:0;}
.tab-btn{padding:0.7rem 1.1rem;font-size:0.85rem;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;display:flex;align-items:center;gap:0.4rem;transition:all 0.15s;font-family:inherit;font-weight:500;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
.tbadge{font-size:0.66rem;background:var(--surface2);color:var(--muted);border:1px solid var(--border);border-radius:20px;padding:0.08rem 0.42rem;font-weight:600;}
.tbadge.warn{background:var(--orange-soft);color:var(--orange);border-color:var(--orange);}

.app-body{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.tab-pane{display:none;flex:1;overflow:hidden;}
.tab-pane.active{display:flex;}

.split{display:flex;flex:1;overflow:hidden;}
.list-panel{width:280px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.edit-scroll{flex:1;overflow-y:auto;padding:1.5rem 2rem 3rem;background:var(--bg);}
.edit-scroll::-webkit-scrollbar{width:8px;}
.edit-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

.list-top{padding:0.7rem;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:0.45rem;flex-shrink:0;}
.search-box{width:100%;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:7px;padding:0.4rem 0.7rem;font-size:0.83rem;transition:all 0.15s;}
.search-box:focus{outline:none;border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 3px var(--accent-soft);}
.list-actions{display:flex;gap:0.35rem;}
.bxs{font-size:0.76rem;padding:0.32rem 0.65rem;border-radius:7px;border:none;cursor:pointer;font-weight:600;background:var(--accent);color:#fff;transition:all 0.15s;font-family:inherit;}
.bxs:hover{background:#c2001a;}
.bxs.sec{background:var(--surface);color:var(--text);border:1px solid var(--border);}
.bxs.sec:hover{background:var(--surface2);border-color:var(--muted);}

.list-scroll{flex:1;overflow-y:auto;}
.list-scroll::-webkit-scrollbar{width:6px;}
.list-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.cat-hdr{padding:0.5rem 0.8rem;font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted2);background:var(--surface2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;}
.rxn-row{padding:0.48rem 0.9rem;font-size:0.84rem;cursor:pointer;border-left:3px solid transparent;color:var(--text-soft);transition:all 0.12s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rxn-row:hover{background:var(--surface2);color:var(--text);}
.rxn-row.active{color:var(--accent);border-left-color:var(--accent);background:var(--accent-soft);font-weight:600;}

/* Difficulty colour system — same minimal palette across all pages.
   Desaturated so four badges read as a calm family rather than competing
   primaries. Badges are outlined (no fill); rows get a thin coloured left
   strip only — the row background stays neutral. */
:root{
  --diff-A:#6fa385; --diff-A-soft:rgba(111,163,133,0.10);
  --diff-B:#7491b8; --diff-B-soft:rgba(116,145,184,0.10);
  --diff-C:#b8884d; --diff-C-soft:rgba(184,136,77,0.10);
  --diff-D:#9a7fad; --diff-D-soft:rgba(154,127,173,0.10);
}
.diff-badge{display:inline-block;min-width:16px;height:16px;line-height:14px;padding:0 4px;
  text-align:center;border-radius:3px;font-size:0.64rem;font-weight:600;
  border:1px solid currentColor;background:transparent;margin-right:0.45rem;vertical-align:middle;}
.diff-badge.diff-A{color:var(--diff-A);}
.diff-badge.diff-B{color:var(--diff-B);}
.diff-badge.diff-C{color:var(--diff-C);}
.diff-badge.diff-D{color:var(--diff-D);}
.rxn-row.diff-row-A{border-left-color:var(--diff-A);}
.rxn-row.diff-row-B{border-left-color:var(--diff-B);}
.rxn-row.diff-row-C{border-left-color:var(--diff-C);}
.rxn-row.diff-row-D{border-left-color:var(--diff-D);}
.rxn-row.diff-row-A.active{border-left-color:var(--diff-A);background:var(--diff-A-soft);color:var(--text);}
.rxn-row.diff-row-B.active{border-left-color:var(--diff-B);background:var(--diff-B-soft);color:var(--text);}
.rxn-row.diff-row-C.active{border-left-color:var(--diff-C);background:var(--diff-C-soft);color:var(--text);}
.rxn-row.diff-row-D.active{border-left-color:var(--diff-D);background:var(--diff-D-soft);color:var(--text);}

.empty-hint{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:0.8rem;}
.empty-hint .ico{width:80px;height:80px;color:var(--border2);}
.empty-hint .ico svg{width:100%;height:100%;}
.fsec{margin-bottom:1.75rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.2rem 1.3rem;box-shadow:var(--shadow-sm);}
.fsec-title{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent);margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem;}
.fsec-title::after{content:'';flex:1;height:1px;background:var(--border);}
.field{margin-bottom:0.75rem;}
.field label{display:block;font-size:0.74rem;color:var(--muted);margin-bottom:0.3rem;font-weight:600;}
.fi{width:100%;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:7px;padding:0.45rem 0.7rem;font-size:0.85rem;font-family:inherit;transition:all 0.15s;}
.fi:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
textarea.fi{resize:vertical;min-height:60px;line-height:1.55;}
select.fi option{background:var(--surface);color:var(--text);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.75rem;}

.tags-wrap{display:flex;flex-wrap:wrap;gap:0.3rem;padding:0.4rem 0.55rem;background:var(--surface);border:1px solid var(--border);border-radius:7px;min-height:38px;align-items:center;cursor:text;transition:all 0.15s;}
.tags-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
.chip{display:inline-flex;align-items:center;gap:0.25rem;font-size:0.72rem;padding:0.15rem 0.5rem;border-radius:20px;background:var(--surface2);color:var(--text-soft);border:1px solid var(--border2);font-weight:500;}
.chip button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.7rem;padding:0;line-height:1;}
.chip button:hover{color:var(--red);}
.tag-inp{border:none;background:none;color:var(--text);font-size:0.82rem;outline:none;flex:1;min-width:60px;padding:0;}

.kp-list{display:flex;flex-direction:column;gap:0.4rem;margin-bottom:0.5rem;}
.kp-row{display:flex;gap:0.4rem;}
.kp-row input{flex:1;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:7px;padding:0.42rem 0.7rem;font-size:0.85rem;font-family:inherit;}
.kp-row input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
.kp-del{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:0.3rem 0.5rem;border-radius:6px;cursor:pointer;font-size:0.74rem;flex-shrink:0;transition:all 0.15s;}
.kp-del:hover{color:var(--red);border-color:var(--red);background:var(--red-soft);}

.smi-prev{background:#fff;border:1px solid var(--border);border-radius:8px;padding:1rem;min-height:100px;display:flex;align-items:center;justify-content:center;margin-top:0.5rem;overflow-x:auto;box-shadow:var(--shadow-sm);}
.smi-ph{font-size:0.8rem;color:var(--muted2);font-style:italic;}

.act-bar{display:flex;gap:0.5rem;padding:1.2rem 0 0;border-top:1px solid var(--border);margin-top:1rem;flex-wrap:wrap;}
.btn{padding:0.5rem 1.1rem;border-radius:8px;border:none;cursor:pointer;font-size:0.86rem;font-weight:600;transition:all 0.15s;font-family:inherit;}
.btn-pri{background:var(--accent);color:#fff;}
.btn-pri:hover:not(:disabled){background:#c2001a;}
.btn-sec{background:var(--surface);color:var(--text);border:1px solid var(--border);}
.btn-sec:hover:not(:disabled){background:var(--surface2);border-color:var(--muted);}
.btn-del{background:var(--surface);color:var(--red);border:1px solid var(--red);}
.btn-del:hover:not(:disabled){background:var(--red-soft);}
.btn:disabled{opacity:0.4;cursor:default;}

.commit-wrap{flex:1;overflow-y:auto;padding:1.75rem 2rem;max-width:880px;background:var(--bg);}
.commit-wrap::-webkit-scrollbar{width:8px;}
.commit-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.3rem;margin-bottom:1.2rem;box-shadow:var(--shadow-sm);}
.card-hdr{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;}
.sdot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0;}
.sdot-grey{background:var(--muted2);}.sdot-green{background:var(--green);}.sdot-orange{background:var(--orange);}.sdot-red{background:var(--red);}
.conn-row{display:flex;align-items:center;gap:0.45rem;font-size:0.78rem;color:var(--text-soft);font-weight:500;}

.fstat-row{display:flex;align-items:center;gap:0.7rem;padding:0.6rem 0;border-bottom:1px solid var(--border);font-size:0.86rem;}
.fstat-row:last-child{border-bottom:none;}
.fstat-name{font-family:ui-monospace,'Cascadia Code','Fira Code',monospace;flex:1;color:var(--text);}
.fstat-info{font-size:0.75rem;color:var(--muted);}
.slabel{font-size:0.7rem;padding:0.15rem 0.55rem;border-radius:20px;font-weight:600;border:1px solid transparent;}
.slabel-ok{background:var(--green-soft);color:var(--green);border-color:var(--green);}
.slabel-mod{background:var(--orange-soft);color:var(--orange);border-color:var(--orange);}
.slabel-unk{background:var(--surface2);color:var(--muted);border-color:var(--border2);}

.cf-row{display:flex;align-items:center;gap:0.6rem;font-size:0.86rem;padding:0.4rem 0;color:var(--text);}
.cf-row input[type=checkbox]{width:auto;accent-color:var(--accent);}

.clog{display:flex;flex-direction:column;}
.centry{display:flex;align-items:center;gap:0.7rem;padding:0.6rem 0;border-bottom:1px solid var(--border);}
.centry:last-child{border-bottom:none;}
.csha{font-family:ui-monospace,'Cascadia Code','Fira Code',monospace;font-size:0.74rem;color:var(--accent);background:var(--accent-soft);padding:0.18rem 0.45rem;border-radius:4px;text-decoration:none;flex-shrink:0;font-weight:600;}
.csha:hover{background:var(--accent);color:#fff;}
.cmsg{font-size:0.85rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);}
.cmeta{font-size:0.73rem;color:var(--muted);flex-shrink:0;}

.toast{position:fixed;bottom:1.4rem;right:1.4rem;padding:0.7rem 1.15rem;border-radius:8px;font-size:0.85rem;opacity:0;transition:opacity 0.25s;pointer-events:none;z-index:100;box-shadow:0 4px 16px rgba(60,55,40,0.15);font-weight:500;}
.toast.show{opacity:1;}
.toast.ok{background:var(--green-soft);color:var(--green);border:1px solid var(--green);}
.toast.err{background:var(--red-soft);color:var(--red);border:1px solid var(--red);}
.spin{display:inline-block;width:13px;height:13px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:rot 0.7s linear infinite;vertical-align:middle;}
@keyframes rot{to{transform:rotate(360deg);}}

.helper-text{margin-top:0.6rem;font-size:0.74rem;color:var(--muted);line-height:1.6;}
.helper-text strong{color:var(--text-soft);font-weight:600;}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="14 52 174 187">
        <path fill="#ff0000" d="M 153.27953,54.242684 141.3862,76.472852 73.360897,76.250643 39.904024,139.16308 16.228467,139.27419 v 13.11599 l 23.452832,0.22273 34.124015,62.80081 68.025306,0.11111 11.33781,21.56406 10.67067,-6.55826 -11.67113,-22.11958 33.79071,-62.80082 -34.12402,-62.801331 12.11554,-21.897371 z m -12.0804,35.318258 30.29893,56.472008 -30.37747,56.07874 -60.322938,0.1571 -30.220377,-56.35367 30.220377,-56.27563 z m 13.04727,56.216728 -22.51801,41.95092 3.81166,2.31872 22.518,-41.87289 c 0,0 2.9e-4,-0.0192 -3.81165,-2.39675 z"/>
      </svg>
    </div>
    <span class="brand-name">OC Referenz</span>
    <span class="brand-sub">Admin</span>
  </div>
  <span class="mode-badge" id="mode-badge">…</span>
  <div class="hnav">
    <a href="./index.html">Referenz</a>
    <a href="./export.html">Export</a>
  </div>
</header>

<div class="tab-bar">
  <button class="tab-btn active" id="tbtn-reactions" onclick="switchTab('reactions')">
    Reaktionen <span class="tbadge" id="badge-count">—</span>
  </button>
  <button class="tab-btn" id="tbtn-commit" onclick="switchTab('commit')">
    Commit <span class="tbadge warn" id="badge-unsaved" style="display:none">ungespeichert</span>
  </button>
</div>

<div class="app-body">

  <div class="tab-pane active" id="tab-reactions">
    <div class="split">
      <div class="list-panel">
        <div class="list-top">
          <input class="search-box" type="text" id="rxn-search" placeholder="Suchen…" oninput="renderList(this.value)">
          <div class="list-actions">
            <button class="bxs" onclick="newRxn()">＋ Neu</button>
            <button class="bxs sec" onclick="dupRxn()">Kop.</button>
            <button class="bxs sec" onclick="importRxn()">Import</button>
          </div>
        </div>
        <div class="list-scroll" id="rxn-list"></div>
      </div>
      <div class="edit-scroll" id="edit-panel">
        <div class="empty-hint">
          <div class="ico"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="10" stroke-linecap="square" stroke-linejoin="miter"><polygon points="30,16 70,16 90,50 70,84 30,84 10,50"/><line x1="70" y1="16" x2="82" y2="0"/><line x1="70" y1="84" x2="82" y2="100"/><line x1="10" y1="50" x2="2" y2="50"/><line x1="70" y1="70" x2="78" y2="56"/></svg></div>
          <div>Reaktion zum Bearbeiten auswählen</div>
        </div>
      </div>
    </div>
  </div>

  <div class="tab-pane" id="tab-commit">
    <div class="commit-wrap">

      <div class="card">
        <div class="card-hdr">
          <span>GitHub Konfiguration</span>
          <span class="conn-row"><span class="sdot sdot-grey" id="conn-dot"></span><span id="conn-text">Nicht konfiguriert</span></span>
        </div>
        <div class="row2">
          <div class="field"><label>Owner</label><input class="fi" id="gh-owner" placeholder="KingAlo7"></div>
          <div class="field"><label>Repository</label><input class="fi" id="gh-repo" placeholder="OC-oecho"></div>
        </div>
        <div class="field"><label>Personal Access Token <small style="color:var(--muted2)">(gespeichert in Browser-localStorage)</small></label>
          <input class="fi" id="gh-pat" type="password" placeholder="ghp_…" autocomplete="off">
        </div>
        <div style="display:flex;gap:0.5rem;margin-top:0.85rem;align-items:center;flex-wrap:wrap">
          <button class="btn btn-pri" onclick="saveGhCfg()">Konfiguration speichern</button>
          <button class="btn btn-sec" onclick="testConn()">Verbindung testen</button>
          <span id="conn-res" style="font-size:0.82rem;color:var(--muted);margin-left:0.3rem"></span>
        </div>
      </div>

      <div class="card">
        <div class="card-hdr"><span>Dateistatus</span><button class="bxs sec" onclick="refreshStatus()">Aktualisieren</button></div>
        <div class="fstat-row">
          <span class="sdot sdot-grey" id="dot-r"></span>
          <span class="fstat-name">data/reactions.json</span>
          <span class="fstat-info" id="info-r">—</span>
          <span class="slabel slabel-unk" id="lbl-r">unbekannt</span>
        </div>
      </div>

      <div class="card">
        <div class="card-hdr">Commit &amp; Push nach main</div>
        <label class="cf-row" style="margin-bottom:0.8rem">
          <input type="checkbox" id="ci-r" checked>
          <span>data/reactions.json</span>
        </label>
        <div class="field"><label>Commit-Nachricht</label>
          <input class="fi" id="commit-msg" placeholder="data: Reaktionen aktualisiert">
        </div>
        <div style="display:flex;align-items:center;gap:0.7rem;margin-top:0.85rem;flex-wrap:wrap">
          <button class="btn btn-pri" id="commit-btn" onclick="doCommit()">Commit &amp; Push</button>
          <span id="commit-res" style="font-size:0.82rem;color:var(--muted)"></span>
        </div>
      </div>

      <div class="card">
        <div class="card-hdr"><span>Letzte Commits — data/</span><button class="bxs sec" onclick="loadHistory()">Laden</button></div>
        <div class="clog" id="clog"><div style="color:var(--muted);font-size:0.83rem">„Laden" klicken, um Commit-Verlauf abzurufen.</div></div>
      </div>

    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
let reactions = [], selRxn = null, unsaved = false;
let shas = { r: null };
let serverMode = false;

async function detectServer() {
  try {
    const r = await fetch('/api/reactions', { method: 'GET', cache: 'no-store' });
    if (!r.ok) { serverMode = false; return false; }
    const ct = (r.headers.get('content-type') || '').toLowerCase();
    if (!ct.includes('application/json')) { serverMode = false; return false; }
    serverMode = true;
    return true;
  } catch {
    serverMode = false;
    return false;
  }
}

function updateModeBadge() {
  const b = document.getElementById('mode-badge');
  if (!b) return;
  b.className = 'mode-badge ' + (serverMode ? 'server' : 'browser');
  b.textContent = serverMode ? 'Server aktiv' : 'Browser-Modus';
}

async function init() {
  if (await detectServer()) {
    try {
      reactions = await fetch('/api/reactions').then(r => r.json());
    } catch (e) {
      toast('Fehler beim Laden vom Server: ' + e.message, 'err');
    }
  } else {
    try {
      reactions = await fetch('./data/reactions.json').then(r => { if(!r.ok) throw 0; return r.json(); });
    } catch {
      toast('reactions.json konnte nicht geladen werden', 'err');
    }
  }
  updateModeBadge();
  renderList(); setBadge(); loadGhCfg();
}

function switchTab(n) {
  ['reactions','commit'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===n);
    document.getElementById('tbtn-'+t).classList.toggle('active', t===n);
  });
}

function renderList(q='') {
  const f = q.toLowerCase();
  const cats = [...new Set(reactions.map(r => r.category))].sort();
  document.getElementById('rxn-list').innerHTML = cats.map(cat => {
    const items = reactions.map((r,i)=>({r,i})).filter(({r}) =>
      r.category===cat && (!f || r.name.toLowerCase().includes(f)
        || (r.tags||[]).some(t=>t.toLowerCase().includes(f))
        || (r.id||'').toLowerCase().includes(f)));
    if (!items.length) return '';
    return `<div class="cat-hdr">${x(cat)} <span>${items.length}</span></div>`
      + items.map(({r,i}) => {
          const d = r.difficulty;
          const badge = d ? `<span class="diff-badge diff-${d}">${d}</span>` : '';
          return `<div class="rxn-row${selRxn===i?' active':''}${d?' diff-row-'+d:''}" onclick="selFn(${i})">${badge}${x(r.name)}</div>`;
        }).join('');
  }).join('') || '<div style="padding:1rem;color:var(--muted);font-size:0.82rem">Keine Treffer</div>';
}
function setBadge() {
  document.getElementById('badge-count').textContent = reactions.length;
  document.getElementById('badge-unsaved').style.display = unsaved ? '' : 'none';
}

function selFn(i) { selRxn=i; renderList(document.getElementById('rxn-search').value); buildForm(reactions[i]); }

function buildForm(r) {
  const cats = [...new Set(reactions.map(rx => rx.category))].sort();
  const catOpts = cats.map(c =>
    `<option value="${x(c)}"${r.category===c?' selected':''}>${x(c)}</option>`
  ).join('') + `<option value="__new__">— Neue Kategorie —</option>`;

  document.getElementById('edit-panel').innerHTML = `
  <div class="fsec">
    <div class="fsec-title">Identität</div>
    <div class="row2">
      <div class="field"><label>ID <small style="color:var(--muted2)">(eindeutiger Slug)</small></label>
        <input class="fi" id="f-id" value="${x(r.id)}" oninput="mu()"></div>
      <div class="field"><label>Reaktionstyp</label>
        <input class="fi" id="f-rtyp" placeholder="SN1, E2, AN…" value="${x(r.reaktionstyp||'')}" oninput="mu()"></div>
    </div>
    <div class="field"><label>Name</label>
      <input class="fi" id="f-name" value="${x(r.name)}" oninput="mu()"></div>
    <div class="row2">
      <div class="field"><label>Schwierigkeit</label>
        <select class="fi" id="f-diff" onchange="mu()">
          <option value="" ${!r.difficulty?'selected':''}>— Keine —</option>
          <option value="A" ${r.difficulty==='A'?'selected':''}>A — Einsteiger/innen</option>
          <option value="B" ${r.difficulty==='B'?'selected':''}>B — LW / JÖChO</option>
          <option value="C" ${r.difficulty==='C'?'selected':''}>C — BW</option>
          <option value="D" ${r.difficulty==='D'?'selected':''}>D — Spezial</option>
        </select></div>
      <div class="field"><label>Untertitel</label>
        <input class="fi" id="f-sub" value="${x(r.subtitle||'')}" oninput="mu()"></div>
    </div>
    <div class="field"><label>Transformation</label>
      <input class="fi" id="f-trans" value="${x(r.transformation||'')}" placeholder="R-X → R-OH" oninput="mu()"></div>
    <div class="field"><label>Kategorie</label>
      <select class="fi" id="f-cat" onchange="catToggle(this)">${catOpts}</select>
      <input class="fi" id="f-cat-new" placeholder="Neue Kategorie eingeben…" style="display:none;margin-top:0.4rem" oninput="mu()">
    </div>
    <div class="field"><label>Tags <small style="color:var(--muted2)">(Enter oder Komma)</small></label>
      <div class="tags-wrap" id="tags-wrap" onclick="document.getElementById('ti').focus()">
        ${(r.tags||[]).map(t=>`<span class="chip">${x(t)}<button onclick="rmTag('${x(t)}')">×</button></span>`).join('')}
        <input class="tag-inp" id="ti" placeholder="Tag…" onkeydown="tagKey(event)">
      </div></div>
  </div>

  <div class="fsec">
    <div class="fsec-title">Struktur</div>
    <div class="field"><label>Reaktions-SMILES <small style="color:var(--muted2)">Reaktanten&gt;Reagenz&gt;Produkte</small></label>
      <input class="fi" id="f-smi" value="${x(r.reaction_smiles||'')}" placeholder="CC(C)(C)Br&gt;H2O&gt;CC(C)(C)OH" oninput="mu();schedP()">
    </div>
    <div class="smi-prev" id="smi-prev"><div class="smi-ph">SMILES oben eingeben zur Vorschau</div></div>
    <div class="row2" style="margin-top:0.75rem">
      <div class="field"><label>Reagenzbeschriftung <small style="color:var(--muted2)">(über Pfeil — LaTeX: <code>H_2SO_4</code>, <code>[Ag(NH_3)_2]^{1+}</code>)</small></label>
        <input class="fi" id="f-rl" value="${x(r.reagent_label||'')}" placeholder="H_2SO_4 / Δ" oninput="mu();schedP()"></div>
      <div class="field"><label>Beschriftung unter Pfeil <small style="color:var(--muted2)">(optional)</small></label>
        <input class="fi" id="f-rlb" value="${x(r.reagent_label_below||'')}" placeholder="Δ / 80 °C" oninput="mu();schedP()"></div>
    </div>
    <div class="field" style="margin-top:0.75rem"><label>Allgemeines Schema <small style="color:var(--muted2)">(Textfallback)</small></label>
      <input class="fi" id="f-gs" value="${x(r.general_scheme||'')}" placeholder="R-X → R-OH" oninput="mu()"></div>
  </div>

  <div class="fsec">
    <div class="fsec-title">Bedingungen &amp; Umfang</div>
    <div class="field"><label>Bedingungen</label><textarea class="fi" id="f-cond" oninput="mu()">${x(r.conditions||'')}</textarea></div>
    <div class="row3">
      <div class="field"><label>Substratumfang</label><input class="fi" id="f-scope" value="${x(r.substrate_scope||'')}" oninput="mu()"></div>
      <div class="field"><label>Stereochemie</label><input class="fi" id="f-stereo" value="${x(r.stereochemistry||'')}" oninput="mu()"></div>
      <div class="field"><label>Kinetik</label><input class="fi" id="f-kin" value="${x(r.kinetics||'')}" oninput="mu()"></div>
    </div>
    <div class="field"><label>Lösungsmittel</label><input class="fi" id="f-solv" value="${x(r.solvent||'')}" oninput="mu()"></div>
  </div>

  <div class="fsec">
    <div class="fsec-title">Schlüsselpunkte &amp; Notizen</div>
    <div class="kp-list" id="kp-list">${(r.key_points||[]).map((p,i)=>`
      <div class="kp-row"><input value="${x(p)}" oninput="mu()"><button class="kp-del" onclick="rmKP(${i})">×</button></div>`).join('')}
    </div>
    <button class="bxs sec" onclick="addKP()">＋ Schlüsselpunkt</button>
    <div class="field" style="margin-top:0.9rem"><label>Notizen / Synthesekontext</label>
      <textarea class="fi" id="f-notes" style="min-height:84px" oninput="mu()">${x(r.notes||'')}</textarea></div>
  </div>

  <div class="act-bar">
    <button class="btn btn-pri" onclick="saveRxn()">Übernehmen</button>
    <button class="btn btn-sec" onclick="dupRxn()">Duplizieren</button>
    <button class="btn btn-del" onclick="delRxn()">Löschen</button>
  </div>
  <div class="helper-text">„Übernehmen" speichert lokal im Browser. Im Server-Modus wird zusätzlich data/reactions.json geschrieben. Zur dauerhaften Veröffentlichung auf GitHub Pages: <strong>Commit &amp; Push</strong> Tab.</div>`;

  if (r.reaction_smiles) drawP(r.reaction_smiles, r.reagent_label, r.reagent_label_below);
}

function catToggle(sel) {
  const inp = document.getElementById('f-cat-new');
  if (sel.value === '__new__') { inp.style.display=''; inp.focus(); }
  else inp.style.display='none';
  mu();
}
function getCat() {
  const sel = document.getElementById('f-cat');
  return sel.value === '__new__'
    ? (document.getElementById('f-cat-new').value.trim() || 'Unkategorisiert')
    : sel.value;
}

function getTags() { return [...document.querySelectorAll('#tags-wrap .chip')].map(c=>c.firstChild.textContent.trim()); }
function rmTag(t) { document.querySelectorAll('#tags-wrap .chip').forEach(c=>{ if(c.firstChild.textContent.trim()===t) c.remove(); }); mu(); }
function tagKey(e) {
  if (e.key==='Enter'||e.key===',') {
    e.preventDefault();
    const v=e.target.value.trim().replace(/,$/,'');
    if(v){ const w=document.getElementById('tags-wrap'); const s=document.createElement('span'); s.className='chip'; s.innerHTML=x(v)+`<button onclick="rmTag('${x(v)}')">×</button>`; w.insertBefore(s,e.target); e.target.value=''; mu(); }
  } else if(e.key==='Backspace'&&e.target.value==='') {
    const c=[...document.querySelectorAll('#tags-wrap .chip')]; if(c.length){c[c.length-1].remove();mu();}
  }
}

function addKP() { const l=document.getElementById('kp-list'); const i=l.children.length; const d=document.createElement('div'); d.className='kp-row'; d.innerHTML=`<input value="" oninput="mu()"><button class="kp-del" onclick="rmKP(${i})">×</button>`; l.appendChild(d); d.querySelector('input').focus(); mu(); }
function rmKP(i) { document.getElementById('kp-list').children[i]?.remove(); mu(); }
function getKPs() { return [...document.querySelectorAll('#kp-list input')].map(i=>i.value.trim()).filter(Boolean); }

let pt; function schedP(){clearTimeout(pt);pt=setTimeout(()=>{const s=document.getElementById('f-smi')?.value?.trim();const l=document.getElementById('f-rl')?.value?.trim();const lb=document.getElementById('f-rlb')?.value?.trim();if(s)drawP(s,l,lb);else{const b=document.getElementById('smi-prev');if(b)b.innerHTML='<div class="smi-ph">SMILES oben eingeben zur Vorschau</div>';}},500);}
function drawP(smiles,label,labelBelow){const b=document.getElementById('smi-prev');if(!b)return;b.innerHTML='<svg id="psv" xmlns="http://www.w3.org/2000/svg"></svg>';requestAnimationFrame(()=>{const svg=document.getElementById('psv');if(svg)ReactionRenderer.draw(smiles,svg,'light',label||'{reagents}',labelBelow||'');});}

function collect() {
  const r={}, g=id=>document.getElementById(id)?.value?.trim(), s=(k,v)=>{if(v)r[k]=v;};
  r.id=g('f-id'); r.category=getCat(); r.name=g('f-name');
  s('difficulty',g('f-diff'));
  s('subtitle',g('f-sub')); s('reaktionstyp',g('f-rtyp')); s('transformation',g('f-trans'));
  r.tags=getTags();
  s('reaction_smiles',g('f-smi')); s('reagent_label',g('f-rl')); s('reagent_label_below',g('f-rlb')); s('general_scheme',g('f-gs'));
  s('conditions',g('f-cond')); s('substrate_scope',g('f-scope')); s('stereochemistry',g('f-stereo'));
  s('kinetics',g('f-kin')); s('solvent',g('f-solv'));
  const kps=getKPs(); if(kps.length) r.key_points=kps;
  s('notes',g('f-notes'));
  return r;
}

async function saveRxn() {
  if(selRxn===null)return;
  const r=collect();
  if(!r.id||!r.name||!r.category){toast('ID, Name und Kategorie erforderlich','err');return;}
  if(reactions.some((y,i)=>y.id===r.id&&i!==selRxn)){toast('ID bereits vorhanden','err');return;}
  reactions[selRxn]=r;
  renderList(document.getElementById('rxn-search').value);
  unsaved=true; setBadge();

  if (!serverMode) await detectServer();
  updateModeBadge();
  if (serverMode) {
    try {
      await persist();
      toast('Übernommen ✓  (Datei aktualisiert)');
    } catch (e) {
      toast('Übernommen — Server-Schreiben fehlgeschlagen: ' + e.message, 'err');
      console.error('saveRxn server write failed:', e);
    }
  } else {
    toast('Übernommen ✓  Zur Veröffentlichung: Commit & Push');
  }
}

function newRxn(){
  const cats=[...new Set(reactions.map(r=>r.category))];
  const r={id:'neu-'+Date.now(),category:cats[0]||'Unkategorisiert',name:'Neue Reaktion',tags:[]};
  reactions.push(r); selRxn=reactions.length-1; renderList(); buildForm(r); unsaved=true; setBadge();
}
function dupRxn(){
  if(selRxn===null)return;
  const r=JSON.parse(JSON.stringify(reactions[selRxn]));
  r.id+='-kop'; r.name+=' (Kopie)'; reactions.push(r); selRxn=reactions.length-1;
  renderList(); buildForm(r); unsaved=true; setBadge();
}

async function delRxn(){
  if(selRxn===null||!confirm(`"${reactions[selRxn].name}" löschen?`))return;
  const removedIdx = selRxn;
  const removed = reactions.splice(selRxn,1)[0];
  selRxn=null;
  renderList();
  document.getElementById('edit-panel').innerHTML='<div class="empty-hint"><div class="ico"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="10" stroke-linecap="square" stroke-linejoin="miter"><polygon points="30,16 70,16 90,50 70,84 30,84 10,50"/><line x1="70" y1="16" x2="82" y2="0"/><line x1="70" y1="84" x2="82" y2="100"/><line x1="10" y1="50" x2="2" y2="50"/><line x1="70" y1="70" x2="78" y2="56"/></svg></div><div>Reaktion zum Bearbeiten auswählen</div></div>';
  unsaved=true; setBadge();

  if (!serverMode) await detectServer();
  updateModeBadge();
  if (serverMode) {
    try {
      await persist();
      toast('Gelöscht ✓  (Datei aktualisiert)');
    } catch (e) {
      reactions.splice(removedIdx, 0, removed);
      selRxn = removedIdx;
      renderList();
      toast('Löschen fehlgeschlagen: ' + e.message, 'err');
      console.error('delRxn server write failed:', e);
    }
  } else {
    toast('Gelöscht ✓  Zur Veröffentlichung: Commit & Push');
  }
}

function importRxn(){
  const raw=prompt('Reaktions-JSON (Objekt oder Array) einfügen:'); if(!raw)return;
  try{let d=JSON.parse(raw);if(!Array.isArray(d))d=[d];let n=0;d.forEach(r=>{if(r.id&&r.name){reactions.push(r);n++;}});renderList();toast(`${n} Reaktion(en) importiert`);unsaved=true;setBadge();}
  catch(e){toast('JSON-Fehler: '+e.message,'err');}
}

async function persist(){
  if(!serverMode) return;
  let res;
  try {
    res = await fetch('/api/reactions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(reactions)
    });
  } catch(e) {
    serverMode = false;
    throw new Error('Server nicht erreichbar (' + e.message + ')');
  }
  if (!res.ok) {
    let detail = '';
    try { detail = ' — ' + (await res.text()).slice(0, 200); } catch {}
    throw new Error('HTTP ' + res.status + detail);
  }
}

function mu(){unsaved=true;setBadge();}

function ghCfg(){return{owner:localStorage.getItem('gh_owner')||'',repo:localStorage.getItem('gh_repo')||'',pat:localStorage.getItem('gh_pat')||''};}
function saveGhCfg(){
  localStorage.setItem('gh_owner',document.getElementById('gh-owner').value.trim());
  localStorage.setItem('gh_repo', document.getElementById('gh-repo').value.trim());
  localStorage.setItem('gh_pat',  document.getElementById('gh-pat').value.trim());
  toast('Konfiguration gespeichert'); setConn('configured');
}
function loadGhCfg(){
  const c=ghCfg();
  document.getElementById('gh-owner').value=c.owner;
  document.getElementById('gh-repo').value=c.repo;
  document.getElementById('gh-pat').value=c.pat;
  if(c.owner&&c.repo&&c.pat)setConn('configured');
}
function setConn(s){
  const dot=document.getElementById('conn-dot'),txt=document.getElementById('conn-text');
  const m={configured:['sdot-orange','Konfiguriert'],connected:['sdot-green','Verbunden'],error:['sdot-red','Fehler']};
  const [cls,lbl]=m[s]||['sdot-grey','Nicht konfiguriert'];
  dot.className='sdot '+cls; txt.textContent=lbl;
}
async function ghFetch(path,opts={}){
  const {pat}=ghCfg(); if(!pat)throw new Error('Kein PAT konfiguriert');
  const res=await fetch(`https://api.github.com${path}`,{...opts,headers:{'Authorization':`Bearer ${pat}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json',...(opts.headers||{})}});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.message||`HTTP ${res.status}`);}
  return res.json();
}
async function testConn(){
  const el=document.getElementById('conn-res'); el.innerHTML='<span class="spin"></span>';
  try{const {owner,repo}=ghCfg();const d=await ghFetch(`/repos/${owner}/${repo}`);el.textContent=`✓ ${d.full_name}`;el.style.color='var(--green)';setConn('connected');}
  catch(e){el.textContent='✗ '+e.message;el.style.color='var(--red)';setConn('error');}
}
async function refreshStatus(){
  const {owner,repo,pat}=ghCfg();if(!pat){toast('GitHub zuerst konfigurieren','err');return;}
  const dot=document.getElementById('dot-r'),info=document.getElementById('info-r'),lbl=document.getElementById('lbl-r');
  try{
    const remote=await ghFetch(`/repos/${owner}/${repo}/contents/data/reactions.json`);
    shas.r=remote.sha;
    const rc=JSON.parse(atob(remote.content.replace(/\n/g,'')));
    const changed=JSON.stringify(reactions)!==JSON.stringify(rc);
    info.textContent=`lokal:${reactions.length} remote:${rc.length}`;
    if(changed){dot.className='sdot sdot-orange';lbl.className='slabel slabel-mod';lbl.textContent='geändert';}
    else{dot.className='sdot sdot-green';lbl.className='slabel slabel-ok';lbl.textContent='aktuell';}
  }catch(e){info.textContent=e.message;lbl.className='slabel slabel-unk';lbl.textContent='Fehler';}
}
async function doCommit(){
  const btn=document.getElementById('commit-btn'),res=document.getElementById('commit-res');
  const msg=document.getElementById('commit-msg').value.trim();
  if(!msg){toast('Commit-Nachricht eingeben','err');return;}
  if(!document.getElementById('ci-r').checked){toast('Mindestens eine Datei auswählen','err');return;}
  btn.disabled=true;btn.innerHTML='<span class="spin"></span> Wird gepusht…';res.textContent='';
  const {owner,repo}=ghCfg();
  try{
    if(!shas.r){const remote=await ghFetch(`/repos/${owner}/${repo}/contents/data/reactions.json`);shas.r=remote.sha;}
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(reactions,null,2))));
    const r=await ghFetch(`/repos/${owner}/${repo}/contents/data/reactions.json`,{method:'PUT',body:JSON.stringify({message:msg,content,sha:shas.r,branch:'main'})});
    shas.r=r.content.sha;
    toast('Erfolgreich gepusht ✓');
    res.textContent='✓ reactions.json committed — Pages wird automatisch neu deployt';
    res.style.color='var(--green)';
    unsaved=false;setBadge();document.getElementById('commit-msg').value='';
    setTimeout(loadHistory,1500);
  }catch(e){
    toast('Commit fehlgeschlagen: '+e.message,'err');
    res.textContent='✗ '+e.message;res.style.color='var(--red)';
  }finally{btn.disabled=false;btn.textContent='Commit & Push';}
}
async function loadHistory(){
  const {owner,repo,pat}=ghCfg();if(!pat){document.getElementById('clog').innerHTML='<div style="color:var(--muted);font-size:0.83rem">GitHub zuerst konfigurieren.</div>';return;}
  const log=document.getElementById('clog');log.innerHTML='<div style="color:var(--muted);font-size:0.83rem"><span class="spin"></span> Lädt…</div>';
  try{
    const commits=await ghFetch(`/repos/${owner}/${repo}/commits?per_page=15&path=data`);
    if(!commits.length){log.innerHTML='<div style="color:var(--muted);font-size:0.83rem">Keine Commits gefunden.</div>';return;}
    log.innerHTML=commits.map(c=>{
      const sha=c.sha.slice(0,7),url=c.html_url,msg=c.commit.message.split('\n')[0];
      const author=c.commit.author.name;
      const d=new Date(c.commit.author.date);
      const date=d.toLocaleDateString('de-AT',{day:'2-digit',month:'2-digit',year:'2-digit'})+' '+d.toLocaleTimeString('de-AT',{hour:'2-digit',minute:'2-digit'});
      return `<div class="centry"><a class="csha" href="${url}" target="_blank">${sha}</a><span class="cmsg" title="${x(msg)}">${x(msg)}</span><span class="cmeta">${x(author)} · ${date}</span></div>`;
    }).join('');
  }catch(e){log.innerHTML=`<div style="color:var(--red);font-size:0.83rem">✗ ${e.message}</div>`;}
}

function x(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
let _tt; function toast(msg,type='ok'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),3000);}

init();
</script>
</body>
