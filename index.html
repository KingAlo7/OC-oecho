<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#c2c5a6">
<title>OC Referenz — ÖChO</title>
<link rel="icon" type="image/svg+xml" href="./assets/logo.svg">
<script src="https://unpkg.com/smiles-drawer@2/dist/smiles-drawer.min.js"></script>
<script src="./reaction-drawer.js"></script>
<style>
:root {
  /* ÖChO light palette */
  --bg:#faf9f5;
  --surface:#ffffff;
  --surface2:#f3f3ec;
  --surface3:#ecebe0;
  --border:#e4e3d8;
  --border2:#cfceb8;
  --text:#1a1a18;
  --text-soft:#3a3a35;
  --muted:#6b6a5d;
  --muted2:#9a9889;
  --accent:#e2001a;
  --accent-soft:#fde4e7;
  --accent2:#ed6b06;
  --sage:#c2c5a6;
  --green:#5a8a2a;
  --red:#c91020;
  --yellow:#b87a00;
  --sidebar:260px;
  --shadow-sm:0 1px 2px rgba(60,55,40,0.04);
  --shadow-md:0 2px 8px rgba(60,55,40,0.06);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}

header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 1.25rem;height:56px;display:flex;align-items:center;gap:1rem;
  flex-shrink:0;z-index:20;box-shadow:var(--shadow-sm);
}
.brand{display:flex;align-items:center;gap:0.6rem;flex-shrink:0;}
.brand-logo{width:30px;height:30px;color:var(--accent);flex-shrink:0;}
.brand-logo svg{width:100%;height:100%;display:block;}
.brand-name{font-size:1.05rem;font-weight:700;color:var(--text);letter-spacing:-0.01em;white-space:nowrap;}
.brand-sub{font-size:0.72rem;font-weight:600;color:var(--muted);letter-spacing:0.04em;text-transform:uppercase;margin-left:-0.3rem;padding:0.15rem 0.45rem;background:var(--surface2);border:1px solid var(--border);border-radius:6px;}

.search-wrap{flex:1;max-width:380px;position:relative;}
.search-icon{position:absolute;left:0.7rem;top:50%;transform:translateY(-50%);
  color:var(--muted2);font-size:0.95rem;pointer-events:none;}
#search{
  width:100%;background:var(--surface2);color:var(--text);
  border:1px solid var(--border);border-radius:8px;
  padding:0.42rem 0.8rem 0.42rem 2.1rem;font-size:0.86rem;
  transition:all 0.15s;
}
#search:focus{outline:none;border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 3px var(--accent-soft);}
#search::placeholder{color:var(--muted2);}

.header-right{margin-left:auto;display:flex;align-items:center;gap:0.5rem;}
.count-badge{font-size:0.75rem;color:var(--muted);background:var(--surface2);
  border:1px solid var(--border);border-radius:20px;padding:0.22rem 0.7rem;white-space:nowrap;}

.nav-link{
  font-size:0.82rem;font-weight:600;text-decoration:none;
  color:var(--accent);border:1px solid var(--accent);
  border-radius:7px;padding:0.32rem 0.78rem;
  transition:all 0.15s;white-space:nowrap;
}
.nav-link:hover{background:var(--accent);color:#fff;}
.nav-link.muted{color:var(--muted);border-color:var(--border2);}
.nav-link.muted:hover{background:var(--surface2);color:var(--text);border-color:var(--muted);}

.layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 56px);}

.sidebar{
  width:var(--sidebar);background:var(--surface);
  border-right:1px solid var(--border);
  overflow-y:auto;flex-shrink:0;
  display:flex;flex-direction:column;
}
.sidebar::-webkit-scrollbar{width:6px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.sidebar::-webkit-scrollbar-track{background:transparent;}
.sidebar-top{padding:0.85rem 0.85rem 0.55rem;border-bottom:1px solid var(--border);flex-shrink:0;}
.sidebar-label{font-size:0.68rem;font-weight:700;text-transform:uppercase;
  letter-spacing:0.1em;color:var(--muted2);padding:0 0.25rem;margin-bottom:0.4rem;}

.cat-group{border-bottom:1px solid var(--border);}
.cat-header{
  display:flex;align-items:center;gap:0.55rem;
  padding:0.62rem 0.95rem;cursor:pointer;
  font-size:0.75rem;font-weight:700;
  color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;
  transition:all 0.12s;user-select:none;
}
.cat-header > span:nth-child(2){
  flex:1;min-width:0;
  word-break:break-word;overflow-wrap:anywhere;hyphens:auto;
  line-height:1.25;
}
.cat-header:hover{color:var(--text);background:var(--surface2);}
.cat-header.open{color:var(--accent);}
.cat-arrow{font-size:0.6rem;flex-shrink:0;transition:transform 0.2s;color:var(--muted2);}
.cat-header.open .cat-arrow{transform:rotate(90deg);color:var(--accent);}
.cat-count{margin-left:auto;font-size:0.68rem;background:var(--surface2);border:1px solid var(--border);
  border-radius:20px;padding:0.05rem 0.45rem;color:var(--muted);font-weight:600;}

.cat-items{display:none;padding:0.2rem 0 0.4rem;}
.cat-header.open + .cat-items{display:block;}

.rxn-link{
  display:flex;align-items:center;gap:0.4rem;
  padding:0.45rem 0.95rem 0.45rem 1.7rem;
  font-size:0.84rem;color:var(--text-soft);cursor:pointer;
  border-left:3px solid transparent;
  transition:all 0.12s;
}
.rxn-link:hover{color:var(--text);background:var(--surface2);}
.rxn-link.active{color:var(--accent);border-left-color:var(--accent);background:var(--accent-soft);font-weight:600;}
.rxn-link.hidden{display:none;}
.rxn-link .rxn-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* Difficulty system — desaturated, minimal. Badges are outlined letters;
   row left-borders are tinted by difficulty when no other state is active. */
:root{
  --diff-A:#6fa385; --diff-A-soft:rgba(111,163,133,0.10);
  --diff-B:#7491b8; --diff-B-soft:rgba(116,145,184,0.10);
  --diff-C:#b8884d; --diff-C-soft:rgba(184,136,77,0.10);
  --diff-D:#9a7fad; --diff-D-soft:rgba(154,127,173,0.10);
}
.diff-badge{display:inline-flex;align-items:center;justify-content:center;
  min-width:16px;height:16px;padding:0 4px;border-radius:3px;
  font-size:0.62rem;font-weight:700;line-height:1;
  border:1px solid currentColor;background:transparent;flex-shrink:0;}
.diff-badge.diff-A{color:var(--diff-A);}
.diff-badge.diff-B{color:var(--diff-B);}
.diff-badge.diff-C{color:var(--diff-C);}
.diff-badge.diff-D{color:var(--diff-D);}
.rxn-link.diff-A:not(.active){border-left-color:var(--diff-A-soft);}
.rxn-link.diff-B:not(.active){border-left-color:var(--diff-B-soft);}
.rxn-link.diff-C:not(.active){border-left-color:var(--diff-C-soft);}
.rxn-link.diff-D:not(.active){border-left-color:var(--diff-D-soft);}

.diff-filter{display:flex;gap:0.3rem;margin-top:0.5rem;}
.diff-pill{flex:1;padding:0.32rem 0;border:1px solid var(--border);
  background:var(--surface);color:var(--muted);
  font-size:0.72rem;font-weight:700;text-align:center;border-radius:5px;
  cursor:pointer;transition:all 0.12s;user-select:none;}
.diff-pill:hover{color:var(--text);border-color:var(--border2);}
.diff-pill.active{color:var(--text);}
.diff-pill.diff-A.active{border-color:var(--diff-A);background:var(--diff-A-soft);}
.diff-pill.diff-B.active{border-color:var(--diff-B);background:var(--diff-B-soft);}
.diff-pill.diff-C.active{border-color:var(--diff-C);background:var(--diff-C-soft);}
.diff-pill.diff-D.active{border-color:var(--diff-D);background:var(--diff-D-soft);}

.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.main::-webkit-scrollbar{width:8px;}
.main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
.main::-webkit-scrollbar-track{background:transparent;}

.welcome{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:3rem 2rem;text-align:center;
}
.welcome-logo{width:96px;height:96px;color:var(--accent);margin-bottom:1.5rem;opacity:0.92;}
.welcome-logo svg{width:100%;height:100%;}
.welcome h1{
  font-size:1.85rem;font-weight:700;margin-bottom:0.55rem;color:var(--text);letter-spacing:-0.02em;
}
.welcome h1 .red{color:var(--accent);}
.welcome p{color:var(--muted);line-height:1.75;max-width:540px;margin-bottom:2.5rem;font-size:0.95rem;}
.cat-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:0.7rem;max-width:720px;width:100%;
}
.cat-card{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:1.1rem;cursor:pointer;text-align:left;
  transition:all 0.15s;
}
.cat-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow-md);}
.cat-card-icon{font-size:1.4rem;margin-bottom:0.55rem;color:var(--accent);font-weight:700;}
.cat-card-name{font-size:0.85rem;font-weight:600;margin-bottom:0.2rem;color:var(--text);
  word-break:break-word;overflow-wrap:anywhere;hyphens:auto;line-height:1.3;}
.cat-card-count{font-size:0.72rem;color:var(--muted);}

.rxn-page{padding:2rem 2.5rem 3rem;max-width:880px;width:100%;}
.rxn-breadcrumb{
  font-size:0.76rem;color:var(--muted);margin-bottom:0.8rem;
  display:flex;align-items:center;gap:0.4rem;
}
.rxn-breadcrumb .sep{color:var(--muted2);}
.rxn-breadcrumb .cat-name{color:var(--accent);cursor:pointer;font-weight:600;}
.rxn-breadcrumb .cat-name:hover{text-decoration:underline;}

.rxn-title{font-size:1.6rem;font-weight:700;margin-bottom:0.25rem;line-height:1.3;color:var(--text);letter-spacing:-0.02em;}
.rxn-subtitle{font-size:0.92rem;color:var(--muted);margin-bottom:1rem;font-style:italic;}

.rxn-tags{display:flex;gap:0.3rem;flex-wrap:wrap;margin-bottom:1.5rem;}
.tag{
  font-size:0.7rem;font-weight:600;padding:0.2rem 0.6rem;border-radius:20px;
  background:var(--surface2);color:var(--muted);border:1px solid var(--border);
  letter-spacing:0.02em;
}

.rxn-drawing{
  background:#ffffff;border:1px solid var(--border);border-radius:12px;
  padding:1.75rem 1.5rem;margin-bottom:1.5rem;
  display:flex;justify-content:center;align-items:center;
  min-height:140px;overflow-x:auto;
  box-shadow:var(--shadow-sm);
}
.rxn-drawing svg{display:block;max-width:100%;height:auto;}
.scheme-text{
  font-size:0.92rem;color:var(--text);text-align:center;
  line-height:2.2;font-family:ui-monospace,'Cascadia Code','Fira Code',monospace;white-space:pre-wrap;
}

.rxn-details{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;overflow:hidden;margin-bottom:1.5rem;
}
.detail-row{
  display:grid;grid-template-columns:170px 1fr;
  border-bottom:1px solid var(--border);font-size:0.87rem;
}
.detail-row:last-child{border-bottom:none;}
.detail-label{
  padding:0.7rem 1rem;color:var(--muted);font-weight:700;
  font-size:0.72rem;text-transform:uppercase;letter-spacing:0.06em;
  background:var(--surface2);border-right:1px solid var(--border);
  display:flex;align-items:flex-start;padding-top:0.78rem;
}
.detail-value{padding:0.7rem 1.1rem;line-height:1.6;color:var(--text);}

.section-head{
  font-size:0.74rem;font-weight:700;text-transform:uppercase;
  letter-spacing:0.1em;color:var(--accent);
  margin:1.6rem 0 0.75rem;display:flex;align-items:center;gap:0.5rem;
}
.section-head::after{content:'';flex:1;height:1px;background:var(--border);}

.key-points{list-style:none;display:flex;flex-direction:column;gap:0.5rem;margin-bottom:0.5rem;}
.key-points li{
  display:flex;align-items:flex-start;gap:0.7rem;
  font-size:0.9rem;line-height:1.6;color:var(--text);
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:0.6rem 0.9rem;
}
.key-points li::before{
  content:'→';color:var(--accent);flex-shrink:0;margin-top:0.05rem;font-weight:700;
}

.notes-block{
  background:#fffbe8;border-left:3px solid var(--accent2);
  border-radius:0 8px 8px 0;padding:1rem 1.2rem;
  font-size:0.9rem;line-height:1.75;color:var(--text-soft);
  margin-bottom:1.5rem;
}

.rxn-nav{
  display:flex;justify-content:space-between;align-items:center;gap:1rem;
  margin-top:2.5rem;padding-top:1.5rem;
  border-top:1px solid var(--border);
}
.nav-btn{
  background:var(--surface);border:1px solid var(--border);
  color:var(--text-soft);padding:0.55rem 1.05rem;border-radius:8px;
  font-size:0.84rem;cursor:pointer;transition:all 0.15s;
  display:flex;align-items:center;gap:0.55rem;
  font-family:inherit;
}
.nav-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}
.nav-btn:disabled{opacity:0.35;cursor:default;}
.nav-btn-label{font-size:0.78rem;color:var(--muted);max-width:200px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

@media(max-width:700px){
  .sidebar{position:fixed;left:-100%;top:56px;height:calc(100vh - 56px);
    z-index:30;transition:left 0.25s;width:min(300px,85vw);box-shadow:var(--shadow-md);}
  .sidebar.open{left:0;}
  .hamburger{display:flex;align-items:center;justify-content:center;
    width:36px;height:36px;border:1px solid var(--border);border-radius:7px;
    background:var(--surface);cursor:pointer;color:var(--text);font-size:1.1rem;}
  .rxn-page{padding:1.25rem;}
  .detail-row{grid-template-columns:120px 1fr;}
  .brand-sub{display:none;}
  .nav-link{padding:0.28rem 0.55rem;font-size:0.76rem;}
}
@media(min-width:701px){.hamburger{display:none;}}
.overlay{display:none;position:fixed;inset:0;background:rgba(60,55,40,0.35);z-index:25;}
.overlay.open{display:block;}
</style>
</head>
<body>

<header>
  <button class="hamburger" onclick="toggleSidebar()" aria-label="Menü">☰</button>
  <div class="brand">
    <div class="brand-logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="14 52 174 187">
        <path fill="#ff0000" d="M 153.27953,54.242684 141.3862,76.472852 73.360897,76.250643 39.904024,139.16308 16.228467,139.27419 v 13.11599 l 23.452832,0.22273 34.124015,62.80081 68.025306,0.11111 11.33781,21.56406 10.67067,-6.55826 -11.67113,-22.11958 33.79071,-62.80082 -34.12402,-62.801331 12.11554,-21.897371 z m -12.0804,35.318258 30.29893,56.472008 -30.37747,56.07874 -60.322938,0.1571 -30.220377,-56.35367 30.220377,-56.27563 z m 13.04727,56.216728 -22.51801,41.95092 3.81166,2.31872 22.518,-41.87289 c 0,0 2.9e-4,-0.0192 -3.81165,-2.39675 z"/>
      </svg>
    </div>
    <span class="brand-name">OC Referenz</span>
    <span class="brand-sub">ÖChO</span>
  </div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input id="search" type="text" placeholder="Reaktionen, Tags suchen…" oninput="globalSearch(this.value)" autocomplete="off">
  </div>
  <a href="./export.html" class="nav-link" title="Exportieren (PDF/Druck)">Export ↗</a>
  <a href="./admin.html" class="nav-link muted" title="Adminbereich">Admin</a>
  <div class="header-right">
    <span class="count-badge" id="count-badge">— Reaktionen</span>
  </div>
</header>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="layout">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-label">Schwierigkeit</div>
      <div class="diff-filter" id="diff-filter">
        <div class="diff-pill diff-A active" data-diff="A" onclick="toggleDiff('A')" title="Einsteiger/innen">A</div>
        <div class="diff-pill diff-B active" data-diff="B" onclick="toggleDiff('B')" title="LW / JÖChO">B</div>
        <div class="diff-pill diff-C active" data-diff="C" onclick="toggleDiff('C')" title="BW">C</div>
        <div class="diff-pill diff-D active" data-diff="D" onclick="toggleDiff('D')" title="Spezial">D</div>
      </div>
      <div class="sidebar-label" style="margin-top:0.85rem">Kategorien</div>
    </div>
    <div id="cat-list"></div>
  </nav>

  <main class="main" id="main">
  </main>
</div>

<script>
let reactions = [];
let activeId  = null;
let diffFilter = new Set(['A','B','C','D']);  // visible difficulties; empty difficulty always shown

const CAT_ICONS = {
  'Nukleophile Substitution': '⇌',
  'Eliminierung': '↑',
  'Elektrophile Addition': '⊕',
  'Carbonylchemie': 'C=O',
  'Grignard-Reagenzien': '⚗',
  'Oxidation': '↗',
  'Reduktion': '↙',
  'Aromatische Chemie': '⬡',
  'Namenreaktionen': '★',
  'Schutzgruppen': '□',
  'Rearrangierungen': '↻',
  'Nucleophilic Substitution': '⇌',
  'Elimination': '↑',
  'Carbonyl Chemistry': 'C=O',
  'Named Reactions': '★',
  'Aromatic Chemistry': '⬡',
  'Reduction': '↙',
};

const LOGO_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="14 52 174 187"><path fill="#ff0000" d="M 153.27953,54.242684 141.3862,76.472852 73.360897,76.250643 39.904024,139.16308 16.228467,139.27419 v 13.11599 l 23.452832,0.22273 34.124015,62.80081 68.025306,0.11111 11.33781,21.56406 10.67067,-6.55826 -11.67113,-22.11958 33.79071,-62.80082 -34.12402,-62.801331 12.11554,-21.897371 z m -12.0804,35.318258 30.29893,56.472008 -30.37747,56.07874 -60.322938,0.1571 -30.220377,-56.35367 30.220377,-56.27563 z m 13.04727,56.216728 -22.51801,41.95092 3.81166,2.31872 22.518,-41.87289 c 0,0 2.9e-4,-0.0192 -3.81165,-2.39675 z"/></svg>`;

async function init() {
  try {
    reactions = await fetch('./data/reactions.json').then(r => r.json());
  } catch(e) {
    showError('Reaktionen konnten nicht geladen werden. Bei lokaler Nutzung Server starten: <code>node server.js</code>');
    return;
  }
  document.getElementById('count-badge').textContent = reactions.length + ' Reaktionen';
  buildSidebar();
  showWelcome();
  const hash = location.hash.slice(1);
  if (hash) { const r = reactions.find(x => x.id === hash); if (r) showReaction(hash); }
}

function categories() { return [...new Set(reactions.map(r => r.category))]; }

function rxnVisible(r) {
  return !r.difficulty || diffFilter.has(r.difficulty);
}

function buildSidebar() {
  const cats = categories();
  document.getElementById('cat-list').innerHTML = cats.map(cat => {
    const items = reactions.filter(r => r.category === cat);
    const visibleN = items.filter(rxnVisible).length;
    return `<div class="cat-group" data-cat="${cat}"${visibleN===0?' style="display:none"':''}>
      <div class="cat-header" onclick="toggleCat(this)">
        <span class="cat-arrow">▶</span>
        <span>${cat}</span>
        <span class="cat-count">${visibleN}</span>
      </div>
      <div class="cat-items">
        ${items.map(r => {
          const d = r.difficulty || '';
          const badge = d ? `<span class="diff-badge diff-${d}" title="${diffLabel(d)}">${d}</span>` : '';
          const hidden = !rxnVisible(r) ? ' hidden' : '';
          const diffCls = d ? ' diff-'+d : '';
          return `<div class="rxn-link${diffCls}${hidden}" id="link-${r.id}" onclick="showReaction('${r.id}')">${badge}<span class="rxn-name">${r.name}</span></div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function diffLabel(d) {
  return ({A:'Einsteiger/innen', B:'LW / JÖChO', C:'BW', D:'Spezial'})[d] || '';
}

function toggleDiff(d) {
  const pill = document.querySelector(`.diff-pill[data-diff="${d}"]`);
  if (diffFilter.has(d)) { diffFilter.delete(d); pill.classList.remove('active'); }
  else                   { diffFilter.add(d);    pill.classList.add('active');    }
  buildSidebar();
  // keep current detail page open even if its row gets hidden — the
  // header navigation still works, and re-enabling the filter restores it.
}
window.toggleDiff = toggleDiff;

function toggleCat(header) { header.classList.toggle('open'); }

function openSidebarFor(id) {
  const link = document.getElementById('link-'+id);
  if (!link) return;
  const header = link.closest('.cat-group')?.querySelector('.cat-header');
  if (header) header.classList.add('open');
  setTimeout(() => link.scrollIntoView({block:'nearest',behavior:'smooth'}), 50);
}

function showWelcome() {
  const cats = categories();
  document.getElementById('main').innerHTML = `
    <div class="welcome">
      <div class="welcome-logo">${LOGO_SVG}</div>
      <h1>Organische Chemie <span class="red">Referenz</span></h1>
      <p>Ein kompaktes Nachschlagewerk — Mechanismen, Bedingungen, Substratumfang und zentrale Erkenntnisse zu den wichtigsten organischen Transformationen. Reaktion aus der Seitenleiste wählen oder Kategorie erkunden.</p>
      <div class="cat-grid">
        ${cats.map(cat => {
          const n = reactions.filter(r => r.category === cat).length;
          const icon = CAT_ICONS[cat] || '◈';
          return `<div class="cat-card" onclick="openCategory('${cat}')">
            <div class="cat-card-icon">${icon}</div>
            <div class="cat-card-name">${cat}</div>
            <div class="cat-card-count">${n} Reaktion${n!==1?'en':''}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
}

function openCategory(cat) {
  const first = reactions.find(r => r.category === cat);
  if (first) showReaction(first.id);
  document.querySelectorAll('.cat-header').forEach(h => {
    if (h.querySelector('span:nth-child(2)')?.textContent === cat) h.classList.add('open');
  });
}

const DETAIL_FIELDS = [
  {key:'conditions',      label:'Bedingungen'},
  {key:'substrate_scope', label:'Substratumfang'},
  {key:'nucleophile',     label:'Nukleophil'},
  {key:'leaving_group',   label:'Abgangsgruppe'},
  {key:'reagents',        label:'Reagenzien'},
  {key:'mechanism',       label:'Mechanismus'},
  {key:'stereochemistry', label:'Stereochemie'},
  {key:'kinetics',        label:'Kinetik'},
  {key:'solvent',         label:'Lösungsmittel'},
];

function showReaction(id) {
  const r = reactions.find(x => x.id === id);
  if (!r) return;
  activeId = id;

  document.querySelectorAll('.rxn-link').forEach(el => el.classList.remove('active'));
  const lnk = document.getElementById('link-'+id);
  if (lnk) lnk.classList.add('active');
  openSidebarFor(id);
  history.replaceState(null,'','#'+id);

  const catItems = reactions.filter(x => x.category === r.category);
  const idx = catItems.findIndex(x => x.id === id);
  const prev = catItems[idx-1] || null;
  const next = catItems[idx+1] || null;

  const svgId = 'rxn-svg-'+id;
  const drawingHtml = r.reaction_smiles
    ? `<svg id="${svgId}" xmlns="http://www.w3.org/2000/svg"></svg>`
    : r.general_scheme
      ? `<div class="scheme-text">${r.general_scheme}</div>`
      : `<div class="scheme-text" style="color:var(--muted)">Keine Struktur verfügbar</div>`;

  const detailsHtml = DETAIL_FIELDS.filter(f => r[f.key]).map(f => `
    <div class="detail-row">
      <div class="detail-label">${f.label}</div>
      <div class="detail-value">${r[f.key]}</div>
    </div>`).join('');

  const tagsHtml = (r.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');

  const keyPointsHtml = (r.key_points||[]).length ? `
    <div class="section-head">Schlüsselpunkte</div>
    <ul class="key-points">${(r.key_points).map(p=>`<li>${p}</li>`).join('')}</ul>` : '';

  const notesHtml = r.notes ? `
    <div class="section-head">Notizen</div>
    <div class="notes-block">${r.notes}</div>` : '';

  document.getElementById('main').innerHTML = `
    <div class="rxn-page">
      <div class="rxn-breadcrumb">
        <span class="cat-name" onclick="openCategory('${r.category}')">${r.category}</span>
        <span class="sep">›</span>
        <span>${r.name}</span>
      </div>

      <h1 class="rxn-title">${r.name}</h1>
      ${r.subtitle ? `<div class="rxn-subtitle">${r.subtitle}</div>` : ''}
      <div class="rxn-tags">${tagsHtml}</div>

      <div class="rxn-drawing">${drawingHtml}</div>

      ${detailsHtml ? `<div class="rxn-details">${detailsHtml}</div>` : ''}

      ${keyPointsHtml}
      ${notesHtml}

      <div class="rxn-nav">
        <button class="nav-btn" onclick="${prev?`showReaction('${prev.id}')`:'void 0'}" ${prev?'':'disabled'}>
          ← <span class="nav-btn-label">${prev?.name||''}</span>
        </button>
        <span style="font-size:0.76rem;color:var(--muted)">${idx+1} / ${catItems.length}</span>
        <button class="nav-btn" onclick="${next?`showReaction('${next.id}')`:'void 0'}" ${next?'':'disabled'}>
          <span class="nav-btn-label">${next?.name||''}</span> →
        </button>
      </div>
    </div>`;

  document.getElementById('main').scrollTop = 0;

  if (r.reaction_smiles) {
    requestAnimationFrame(() => {
      const svgEl = document.getElementById(svgId);
      if (svgEl) ReactionRenderer.draw(r.reaction_smiles, svgEl, 'light', r.reagent_label||'{reagents}', r.reagent_label_below||'');
    });
  }
}

function globalSearch(q) {
  const s = q.toLowerCase().trim();
  document.querySelectorAll('.cat-group').forEach(group => {
    const links = group.querySelectorAll('.rxn-link');
    let any = false;
    links.forEach(link => {
      const id  = link.id.replace('link-','');
      const r   = reactions.find(x => x.id === id);
      const hit = !s
        || r.name.toLowerCase().includes(s)
        || r.category.toLowerCase().includes(s)
        || (r.tags||[]).some(t => t.toLowerCase().includes(s))
        || (r.subtitle||'').toLowerCase().includes(s)
        || (r.notes||'').toLowerCase().includes(s);
      link.classList.toggle('hidden', !hit);
      if (hit) any = true;
    });
    group.style.display = any ? '' : 'none';
    const header = group.querySelector('.cat-header');
    if (s && any) header.classList.add('open');
    else if (!s) { group.style.display=''; }
  });
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}

function showError(msg) {
  document.getElementById('main').innerHTML = `
    <div style="padding:3rem;text-align:center;color:var(--red)">
      <div style="font-size:2rem;margin-bottom:1rem">⚠</div>
      <div>${msg}</div>
    </div>`;
}

init();
</script>
</body>
</html>
