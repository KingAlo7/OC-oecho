<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OC-Quiz</title>
<script src="https://unpkg.com/smiles-drawer@2/dist/smiles-drawer.min.js"></script>
<script src="/reaction-drawer.js"></script>
<style>
  :root {
    --bg:#0f1117;--surface:#1a1d27;--border:#2a2d3a;
    --accent:#6c8ef7;--accent2:#a78bfa;
    --text:#e8eaf0;--muted:#7a7f9a;
    --green:#4ade80;--red:#f87171;--yellow:#fbbf24;--flag:#f59e0b;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;gap:1rem;}
  header h1{font-size:1.4rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  header nav{margin-left:auto;display:flex;gap:0.75rem;}
  header nav a{color:var(--muted);text-decoration:none;font-size:0.9rem;padding:0.3rem 0.7rem;border-radius:6px;transition:background 0.2s;}
  header nav a:hover{background:var(--border);color:var(--text);}

  .container{max-width:900px;margin:0 auto;padding:2rem;}

  /* ── Filters ── */
  .filter-row{display:flex;gap:0.6rem;flex-wrap:wrap;margin-bottom:0.75rem;align-items:center;}
  select{background:var(--surface);color:var(--text);border:1px solid var(--border);padding:0.45rem 0.8rem;border-radius:8px;font-size:0.88rem;cursor:pointer;}
  select:focus{outline:none;border-color:var(--accent);}
  .btn{background:var(--accent);color:#fff;border:none;padding:0.45rem 1rem;border-radius:8px;font-size:0.88rem;cursor:pointer;font-weight:600;transition:opacity 0.2s;}
  .btn:hover{opacity:0.85;}
  .btn.secondary{background:var(--surface);color:var(--text);border:1px solid var(--border);}
  .btn.secondary:hover{border-color:var(--accent);color:var(--accent);}

  /* ── Tag chips ── */
  .chips-label{font-size:0.75rem;color:var(--muted);margin-bottom:0.35rem;}
  .chips{display:flex;gap:0.35rem;flex-wrap:wrap;margin-bottom:1rem;}
  .chip{font-size:0.72rem;font-weight:600;padding:0.2rem 0.65rem;border-radius:20px;cursor:pointer;
        border:1px solid var(--border);color:var(--muted);background:var(--surface);
        transition:all 0.15s;user-select:none;letter-spacing:0.02em;}
  .chip:hover{border-color:var(--accent);color:var(--text);}
  .chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .chip.flag-chip{border-color:var(--flag);color:var(--flag);}
  .chip.flag-chip:hover{background:#3a2500;}
  .chip.flag-chip.active{background:var(--flag);color:#1a0e00;border-color:var(--flag);}

  /* ── Progress ── */
  #progress-label{font-size:0.78rem;color:var(--muted);margin-bottom:0.4rem;}
  #progress-bar-wrap{background:var(--border);border-radius:4px;height:4px;margin-bottom:1.5rem;}
  #progress-bar{height:4px;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 0.4s;}

  /* ── Card ── */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1.5rem;animation:fadeIn 0.3s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

  .card-header{display:flex;align-items:flex-start;gap:0.5rem;margin-bottom:0.9rem;flex-wrap:wrap;}
  .badges{display:flex;gap:0.4rem;flex-wrap:wrap;flex:1;}
  .badge{font-size:0.7rem;font-weight:700;padding:0.18rem 0.55rem;border-radius:20px;text-transform:uppercase;letter-spacing:0.05em;}
  .badge.topic {background:#1e3a5f;color:var(--accent);}
  .badge.easy  {background:#14532d;color:var(--green);}
  .badge.medium{background:#713f12;color:var(--yellow);}
  .badge.hard  {background:#450a0a;color:var(--red);}
  /* tag badges on card */
  .tag-badge{font-size:0.68rem;padding:0.15rem 0.5rem;border-radius:20px;background:#1e2030;color:var(--muted);border:1px solid var(--border);}
  .tag-badge.clickable{cursor:pointer;}
  .tag-badge.clickable:hover{border-color:var(--accent);color:var(--accent);}

  /* flag button */
  .flag-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:0.2rem 0.5rem;border-radius:6px;cursor:pointer;font-size:0.85rem;transition:all 0.15s;flex-shrink:0;}
  .flag-btn:hover{border-color:var(--flag);color:var(--flag);}
  .flag-btn.flagged{border-color:var(--flag);color:var(--flag);background:#2a1a00;}

  .card h2{font-size:1.02rem;line-height:1.55;margin-bottom:1rem;}

  canvas.smiles-canvas{display:block;margin:0 auto 1rem;border-radius:8px;background:#fff;}
  .reaction-wrap{display:flex;justify-content:center;align-items:center;margin:0 auto 1rem;background:#12151f;border-radius:10px;padding:0.75rem 1rem;overflow-x:auto;}
  .reaction-wrap svg{display:block;max-width:100%;height:auto;}

  .options{display:grid;grid-template-columns:1fr 1fr;gap:0.55rem;}
  @media(max-width:540px){.options{grid-template-columns:1fr;}}
  .option{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:0.65rem 1rem;border-radius:8px;cursor:pointer;text-align:left;font-size:0.88rem;transition:border-color 0.15s,background 0.15s;width:100%;}
  .option:hover:not(:disabled){border-color:var(--accent);background:#1a1d2f;}
  .option.correct  {border-color:var(--green);background:#052a0f;color:var(--green);}
  .option.incorrect{border-color:var(--red);  background:#2a0505;color:var(--red);}
  .option:disabled{cursor:default;}

  .explanation{margin-top:1rem;padding:0.85rem 1rem;background:#12151f;border-left:3px solid var(--accent);border-radius:0 8px 8px 0;font-size:0.86rem;color:var(--muted);line-height:1.6;display:none;}
  .explanation.show{display:block;animation:fadeIn 0.2s ease;}
  .nav-row{display:flex;gap:0.7rem;margin-top:1.1rem;}

  /* ── Score ── */
  #score-panel{text-align:center;padding:3rem 2rem;background:var(--surface);border:1px solid var(--border);border-radius:14px;display:none;}
  #score-panel h2{font-size:2rem;margin-bottom:0.5rem;}
  #score-panel p{color:var(--muted);margin-bottom:1.5rem;}
  #score-circle{width:120px;height:120px;border-radius:50%;margin:0 auto 1.5rem;display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:700;border:4px solid var(--accent);background:var(--bg);color:var(--accent);}
  #empty{text-align:center;color:var(--muted);padding:3rem;display:none;}
</style>
</head>
<body>
<header>
  <h1>⚗ OC-Quiz</h1>
  <nav><a href="/admin.html">Admin</a><a href="/export">Export</a></nav>
</header>

<div class="container">
  <div id="server-banner" style="display:none;align-items:center;gap:0.7rem;background:#2a1a00;border:1px solid var(--flag);color:var(--flag);border-radius:10px;padding:0.75rem 1rem;margin-bottom:1.2rem;font-size:0.85rem;">
    <span>⚠</span>
    <span>Server not running — showing embedded questions (read-only). Run <code style="background:#1a1000;padding:0.1rem 0.4rem;border-radius:4px">npm install &amp;&amp; node server.js</code> then open <a href="http://localhost:3000" style="color:var(--accent)">localhost:3000</a>.</span>
  </div>
  <div class="filter-row">
    <select id="filter-topic"><option value="">All topics</option></select>
    <select id="filter-diff">
      <option value="">All difficulties</option>
      <option>easy</option><option>medium</option><option>hard</option>
    </select>
    <button class="btn" onclick="startQuiz()">Start / Restart</button>
    <button class="btn secondary" onclick="clearFilters()">Clear filters</button>
  </div>

  <div class="chips-label" id="tag-label" style="display:none">Filter by tag (OR logic):</div>
  <div class="chips" id="tag-chips"></div>

  <div id="progress-label"></div>
  <div id="progress-bar-wrap"><div id="progress-bar" style="width:0%"></div></div>

  <div id="quiz-area"></div>
  <div id="empty">No questions match these filters.</div>
  <div id="score-panel">
    <div id="score-circle"></div>
    <h2>Quiz complete!</h2>
    <p id="score-detail"></p>
    <button class="btn" onclick="startQuiz()">Retry</button>
  </div>
</div>

<script>

/* ── Embedded fallback data (used when server is not running) ── */
const FALLBACK_QUESTIONS = [{"id":"q1","topic":"Substitution","difficulty":"easy","type":"mcq","tags":["SN1","carbocation","solvolysis"],"flagged":false,"question":"Which mechanism applies to (CH₃)₃CBr reacting with OH⁻ in aqueous solvent?","smiles":"CC(C)(C)Br","options":["SN1","SN2","E1","E2"],"answer":"SN1","explanation":"Tertiary substrate forms a stable 3° carbocation. Polar protic solvent stabilises the ion pair. SN2 is sterically blocked."},{"id":"q2","topic":"Substitution","difficulty":"easy","type":"mcq","tags":["SN2","backside-attack"],"flagged":false,"question":"CH₃Br + CN⁻ in DMSO proceeds via …","smiles":"CBr","options":["SN1","SN2","E1","E2"],"answer":"SN2","explanation":"Primary substrate, strong nucleophile, aprotic solvent — classic SN2 conditions. Inversion at carbon."},{"id":"q3","topic":"Elimination","difficulty":"medium","type":"mcq","tags":["E2","Zaitsev","base"],"flagged":false,"question":"Treatment of 2-bromo-2-methylbutane with KOtBu/tBuOH gives predominantly …","smiles":"CCC(C)(C)Br","options":["2-methylbut-1-ene (less substituted)","2-methylbut-2-ene (more substituted)","SN2 product","No reaction"],"answer":"2-methylbut-2-ene (more substituted)","explanation":"Bulky base (KOtBu) favours E2. Zaitsev: more substituted alkene predominates."},{"id":"q4","topic":"Carbonyl","difficulty":"medium","type":"mcq","tags":["reduction","LiAlH4","carboxylic-acid"],"flagged":false,"question":"Which reagent converts a carboxylic acid directly to a primary alcohol in one step?","smiles":"CC(=O)O","options":["NaBH₄","LiAlH₄","DIBAL-H (1 eq, −78 °C)","H₂/Pd"],"answer":"LiAlH₄","explanation":"LiAlH₄ reduces RCOOH → RCH₂OH. NaBH₄ is too mild. DIBAL-H at −78 °C stops at the aldehyde."},{"id":"q5","topic":"Named Reactions","difficulty":"hard","type":"mcq","tags":["Wittig","alkene-synthesis","ylide","advanced"],"flagged":false,"question":"The Wittig reaction converts a ketone into an alkene using …","smiles":"CC(=O)C","options":["Phosphorus ylide (Ph₃P=CHR)","Grignard reagent","Enamine (Stork)","Horner–Wadsworth–Emmons reagent"],"answer":"Phosphorus ylide (Ph₃P=CHR)","explanation":"Wittig uses Ph₃P=CR₂ to give the alkene with defined geometry. HWE is a related modified version."},{"id":"q6","topic":"Carbonyl","difficulty":"hard","type":"mcq","tags":["aldol","enolate","enol","advanced"],"flagged":false,"question":"In an aldol condensation under acidic conditions, the nucleophile is …","smiles":"CC=O","options":["Enolate anion","Enol tautomer","Acylium ion","Carbocation"],"answer":"Enol tautomer","explanation":"Under acidic conditions the enol (not enolate) acts as nucleophile. Base catalysis gives the enolate."},{"id":"q7","topic":"Functional Groups","difficulty":"easy","type":"true_false","tags":["ester","hydrolysis","saponification"],"flagged":false,"question":"An ester can be hydrolysed under both acidic and basic conditions.","smiles":"CC(=O)OC","options":["True","False"],"answer":"True","explanation":"Acid hydrolysis is reversible (Fischer); base hydrolysis (saponification) is irreversible due to carboxylate."},{"id":"q8","topic":"Stereochemistry","difficulty":"medium","type":"mcq","tags":["SN2","Walden-inversion","chiral-centre"],"flagged":false,"question":"SN2 at a chiral centre proceeds with …","smiles":"C[C@@H](Br)CC","options":["Retention","Inversion (Walden inversion)","Racemisation","No stereospecificity"],"answer":"Inversion (Walden inversion)","explanation":"Backside attack in SN2 inverts all three remaining substituents — classic Walden inversion."},{"id":"q9","topic":"Substitution","difficulty":"medium","type":"mcq","tags":["SN1","solvolysis","carbocation"],"flagged":false,"question":"What is the major organic product of this reaction?","reaction_smiles":"CC(C)(C)Br>O>CC(C)(C)O","reagent_label":"H₂O / SN1","options":["(CH₃)₃COH","(CH₃)₃CBr","(CH₃)₂C=CH₂","(CH₃)₃CCl"],"answer":"(CH₃)₃COH","explanation":"Tertiary substrate undergoes SN1 solvolysis in water to give tert-butanol."},{"id":"q10","topic":"Elimination","difficulty":"hard","type":"mcq","tags":["E2","Hofmann","bulky-base","advanced"],"flagged":false,"question":"Identify the major product of this elimination reaction.","reaction_smiles":"CCC(C)Br>CC(C)(C)[O-]>CCC(=C)","reagent_label":"KOtBu / E2","options":["2-methylbut-1-ene (Hofmann)","2-methylbut-2-ene (Zaitsev)","SN2 alcohol","No reaction"],"answer":"2-methylbut-1-ene (Hofmann)","explanation":"Bulky KOtBu gives the Hofmann alkene via E2 — steric preference for the less hindered β-hydrogen."},{"id":"q11","topic":"Carbonyl","difficulty":"medium","type":"mcq","tags":["reduction","NaBH4","chemoselective","selectivity"],"flagged":false,"question":"NaBH₄ is added to a molecule containing both a ketone and an ester. Which group is reduced?","smiles":"CC(=O)CCC(=O)OCC","options":["Ketone only","Ester only","Both ketone and ester","Neither — NaBH₄ is too mild"],"answer":"Ketone only","explanation":"NaBH₄ is mild enough to reduce ketones and aldehydes but not esters. LiAlH₄ is required for esters."},{"id":"q12","topic":"Oxidation","difficulty":"easy","type":"mcq","tags":["oxidation","PCC","alcohol","aldehyde"],"flagged":false,"question":"PCC oxidises a primary alcohol to give …","smiles":"CCCO","options":["Aldehyde (stops there)","Carboxylic acid","Ketone","Ester"],"answer":"Aldehyde (stops there)","explanation":"PCC (pyridinium chlorochromate) is a mild oxidant that stops at the aldehyde. KMnO₄ or CrO₃ would continue to the acid."},{"id":"q13","topic":"Aromatic","difficulty":"medium","type":"mcq","tags":["EAS","directing-effects","activating","aromatic"],"flagged":false,"question":"Which substituent directs electrophilic aromatic substitution ortho/para and activates the ring?","smiles":"Cc1ccccc1","options":["–CH₃ (alkyl)","–NO₂","–CF₃","–COOH"],"answer":"–CH₃ (alkyl)","explanation":"Alkyl groups are ortho/para directors and activators via hyperconjugation and induction. –NO₂, –CF₃, –COOH are meta directors and deactivators."},{"id":"q14","topic":"Oxidation","difficulty":"medium","type":"mcq","tags":["ozonolysis","oxidation","alkene","advanced"],"flagged":false,"question":"What are the carbonyl products of ozonolysis (O₃, then Me₂S workup) of (Z)-but-2-ene?","reaction_smiles":"C/C=C\\C>>CC=O.CC=O","reagent_label":"1. O₃  2. Me₂S","options":["Two equivalents of acetaldehyde","Butanedial","Acetic acid + acetaldehyde","Butanone"],"answer":"Two equivalents of acetaldehyde","explanation":"Ozonolysis cleaves the C=C. Reductive workup (Me₂S) gives aldehydes from internal alkenes. Each carbon of the double bond becomes a carbonyl."},{"id":"q15","topic":"Named Reactions","difficulty":"hard","type":"mcq","tags":["Diels-Alder","cycloaddition","stereoselective","advanced","diene"],"flagged":false,"question":"What diene conformation is required for a Diels-Alder reaction to proceed?","smiles":"C=CC=C","options":["s-cis","s-trans","E-configuration","Any — conformation is irrelevant"],"answer":"s-cis","explanation":"The diene must adopt the s-cis conformation so both terminal carbons can simultaneously overlap with the dienophile π system in the [4+2] transition state."},{"id":"q16","topic":"Carbonyl","difficulty":"hard","type":"mcq","tags":["Grignard","nucleophilic-addition","carboxylation","advanced"],"flagged":false,"question":"Ethylmagnesium bromide is treated with CO₂, then aqueous workup. The product is …","smiles":"CC[Mg]Br","options":["Propanoic acid","Ethanol","Propanal","Diethyl carbonate"],"answer":"Propanoic acid","explanation":"Grignard + CO₂ → magnesium carboxylate salt; aqueous workup protonates to give propanoic acid (RMgX + CO₂ → RCOOH, one extra carbon)."},{"id":"q17","topic":"Named Reactions","difficulty":"hard","type":"mcq","tags":["Beckmann","rearrangement","oxime","advanced"],"flagged":false,"question":"The Beckmann rearrangement of cyclohexanone oxime with H₂SO₄ gives …","smiles":"O=C1CCCCC1","options":["ε-Caprolactam (a cyclic amide)","Cyclohexanone","Cyclohexylamine","Adipic acid"],"answer":"ε-Caprolactam (a cyclic amide)","explanation":"Beckmann: the group anti to –OH migrates to nitrogen as the oxime loses water; the N–O bond breaks to give a nitrilium ion that is trapped by water, ultimately giving the amide (lactam for cyclic ketones)."},{"id":"q18","topic":"Functional Groups","difficulty":"medium","type":"mcq","tags":["protection","alcohol","THP","advanced"],"flagged":false,"question":"Which conditions protect a primary alcohol as a THP (tetrahydropyranyl) ether?","smiles":"OCCO","options":["DHP, PPTS (cat.)","TBSCl, imidazole","Ac₂O, pyridine","BnBr, NaH"],"answer":"DHP, PPTS (cat.)","explanation":"3,4-Dihydro-2H-pyran (DHP) with an acid catalyst (PPTS or p-TsOH) forms THP ethers under mild conditions. TBSCl gives silyl ethers; Ac₂O gives acetates; BnBr/NaH gives benzyl ethers."},{"id":"q19","topic":"Carbonyl","difficulty":"easy","type":"mcq","tags":["esterification","Fischer","condensation","named-reaction"],"flagged":false,"question":"What are the products of this acid-catalysed esterification?","reaction_smiles":"CC(=O)O.CO>>CC(=O)OC.O","reagent_label":"H₂SO₄ / Δ","options":["Methyl acetate + water","Acetic anhydride + water","Ethyl acetate + water","Methanol + CO₂"],"answer":"Methyl acetate + water","explanation":"Fischer esterification: acetic acid + methanol → methyl acetate + water (equilibrium driven right by excess alcohol or removal of water)."},{"id":"q20","topic":"Oxidation","difficulty":"easy","type":"true_false","tags":["oxidation","fundamentals","alcohol"],"flagged":false,"question":"The conversion of a primary alcohol to an aldehyde is an oxidation reaction.","smiles":"CCO","options":["True","False"],"answer":"True","explanation":"Oxidation increases the number of C–O bonds (or C–heteroatom bonds) and/or removes C–H bonds. Going from RCH₂OH to RCHO removes two H atoms from carbon — this is oxidation by the organic chemistry definition."}];

let questions=[], filtered=[], current=0, score=0;
let activeTags = new Set();
let showFlagged = false;
let flagged = new Set(JSON.parse(localStorage.getItem('oc-quiz-flagged')||'[]'));
const SD = window.SmilesDrawer;

async function load() {
  try {
    const res = await fetch('/api/questions');
    if (!res.ok) throw new Error('Server responded ' + res.status);
    questions = await res.json();
    document.getElementById('server-banner').style.display = 'none';
  } catch(err) {
    console.warn('Server not reachable, using embedded questions:', err.message);
    questions = FALLBACK_QUESTIONS;
    document.getElementById('server-banner').style.display = 'flex';
  }
  const topics = [...new Set(questions.map(q=>q.topic))];
  const sel = document.getElementById('filter-topic');
  topics.forEach(t=>{const o=document.createElement('option');o.textContent=t;sel.appendChild(o);});
  buildTagChips();
  startQuiz();
}

/* ── Tag chip bar ─────────────────────────────────────────────────── */
function buildTagChips() {
  const allTags = [...new Set(questions.flatMap(q=>q.tags||[]))].sort();
  const wrap = document.getElementById('tag-chips');
  const label = document.getElementById('tag-label');
  if (!allTags.length) { wrap.innerHTML=''; label.style.display='none'; return; }
  label.style.display = 'block';
  wrap.innerHTML =
    `<span class="chip flag-chip${showFlagged?' active':''}" onclick="toggleFlagged()">🚩 Flagged</span>` +
    allTags.map(t=>`<span class="chip${activeTags.has(t)?' active':''}" onclick="toggleTag('${t}')">${t}</span>`).join('');
}

function toggleTag(t) {
  activeTags.has(t) ? activeTags.delete(t) : activeTags.add(t);
  buildTagChips(); startQuiz();
}
function toggleFlagged() {
  showFlagged = !showFlagged;
  buildTagChips(); startQuiz();
}
function clearFilters() {
  document.getElementById('filter-topic').value='';
  document.getElementById('filter-diff').value='';
  activeTags.clear(); showFlagged=false;
  buildTagChips(); startQuiz();
}

/* ── Flag persistence ─────────────────────────────────────────────── */
function toggleFlag(id) {
  flagged.has(id) ? flagged.delete(id) : flagged.add(id);
  localStorage.setItem('oc-quiz-flagged', JSON.stringify([...flagged]));
  const btn = document.getElementById('flag-btn-'+id);
  if (btn) btn.classList.toggle('flagged', flagged.has(id));
  buildTagChips(); // refresh flagged chip count
}

/* ── Quiz logic ───────────────────────────────────────────────────── */
function startQuiz() {
  const topic = document.getElementById('filter-topic').value;
  const diff  = document.getElementById('filter-diff').value;
  filtered = questions.filter(q => {
    if (topic && q.topic !== topic) return false;
    if (diff  && q.difficulty !== diff) return false;
    if (showFlagged && !flagged.has(q.id)) return false;
    if (activeTags.size > 0 && !(q.tags||[]).some(t=>activeTags.has(t))) return false;
    return true;
  });
  shuffle(filtered);
  current=0; score=0;
  document.getElementById('score-panel').style.display='none';
  document.getElementById('quiz-area').innerHTML='';
  document.getElementById('empty').style.display = filtered.length ? 'none' : 'block';
  if (filtered.length) render();
}

function render() {
  updateProgress();
  if (current >= filtered.length) { showScore(); return; }
  const q = filtered[current];
  const molId = `mol-${current}`;
  const rxnId = `rxn-${current}`;
  const isFlagged = flagged.has(q.id);

  const tagBadges = (q.tags||[]).map(t=>
    `<span class="tag-badge clickable" onclick="activateTag('${t}')" title="Filter by ${t}">${t}</span>`
  ).join('');

  document.getElementById('quiz-area').innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="badges">
          <span class="badge topic">${q.topic}</span>
          <span class="badge ${q.difficulty}">${q.difficulty}</span>
          ${tagBadges}
        </div>
        <button class="flag-btn${isFlagged?' flagged':''}" id="flag-btn-${q.id}"
          onclick="toggleFlag('${q.id}')" title="${isFlagged?'Remove flag':'Flag for review'}">🚩</button>
      </div>
      <h2>${q.question}</h2>
      ${q.smiles?`<canvas id="${molId}" class="smiles-canvas" width="300" height="180"></canvas>`:''}
      ${q.reaction_smiles?`<div class="reaction-wrap"><svg id="${rxnId}" xmlns="http://www.w3.org/2000/svg"></svg></div>`:''}
      <div class="options" id="opts">
        ${q.options.map((o,i)=>`<button class="option" onclick="choose(${i})">${o}</button>`).join('')}
      </div>
      <div class="explanation" id="exp">${q.explanation||''}</div>
      <div class="nav-row" id="nav-row" style="display:none">
        <button class="btn" onclick="next()">Next →</button>
      </div>
    </div>`;

  if (q.smiles) {
    const d = new SD.Drawer({width:300,height:180});
    SD.parse(q.smiles, tree=>d.draw(tree,molId,'light'), err=>console.warn(err));
  }
  if (q.reaction_smiles) {
    ReactionRenderer.draw(q.reaction_smiles, rxnId, 'dark', q.reagent_label||'{reagents}');
  }
}

function activateTag(t) {
  if (!activeTags.has(t)) { activeTags.add(t); buildTagChips(); startQuiz(); }
}

function choose(idx) {
  const q = filtered[current];
  const btns = document.querySelectorAll('.option');
  btns.forEach(b=>b.disabled=true);
  const correct = q.options[idx]===q.answer;
  if (correct) { btns[idx].classList.add('correct'); score++; }
  else {
    btns[idx].classList.add('incorrect');
    const ci = q.options.indexOf(q.answer);
    if (ci>=0) btns[ci].classList.add('correct');
  }
  document.getElementById('exp').classList.add('show');
  document.getElementById('nav-row').style.display='flex';
}

function next() { current++; render(); }

function updateProgress() {
  const pct = filtered.length ? (current/filtered.length)*100 : 0;
  document.getElementById('progress-bar').style.width = pct+'%';
  document.getElementById('progress-label').textContent =
    filtered.length ? `Question ${Math.min(current+1,filtered.length)} of ${filtered.length}` : '';
}

function showScore() {
  document.getElementById('quiz-area').innerHTML='';
  const pct = Math.round((score/filtered.length)*100);
  document.getElementById('score-panel').style.display='block';
  document.getElementById('score-circle').textContent=pct+'%';
  document.getElementById('score-detail').textContent=`${score} / ${filtered.length} correct`;
}

function shuffle(a) {
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
}

load();
</script>
</body>
