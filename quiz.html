<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#c2c5a6">
<title>OC Quiz — ÖChO</title>
<link rel="icon" type="image/svg+xml" href="./assets/logo.svg">
<script src="https://unpkg.com/smiles-drawer@2/dist/smiles-drawer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/openchemlib/dist/openchemlib-full.js"></script>
<script src="./reaction-drawer.js"></script>
<script src="./mol-renderer.js"></script>
<script src="./scheme-graph-editor.js"></script>
<style>
:root {
  --bg:#faf9f5;
  --surface:#ffffff;
  --surface2:#f3f3ec;
  --surface3:#ecebe0;
  --border:#e4e3d8;
  --border2:#cfceb8;
  --text:#1a1a18;
  --text-soft:#3a3a35;
  --muted:#6b6a5d;
  --muted2:#9a9889;
  --accent:#e2001a;
  --accent-soft:#fde4e7;
  --accent2:#ed6b06;
  --sage:#c2c5a6;
  --green:#5a8a2a;
  --green-soft:#eaf4dc;
  --red:#c91020;
  --red-soft:#fde4e7;
  --yellow:#b87a00;
  --sidebar:280px;
  --shadow-sm:0 1px 2px rgba(60,55,40,0.04);
  --shadow-md:0 2px 8px rgba(60,55,40,0.06);
  --header-h:56px;
  --diff-A:#6fa385; --diff-A-soft:rgba(111,163,133,0.10);
  --diff-B:#7491b8; --diff-B-soft:rgba(116,145,184,0.10);
  --diff-C:#b8884d; --diff-C-soft:rgba(184,136,77,0.10);
  --diff-D:#9a7fad; --diff-D-soft:rgba(154,127,173,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.25rem;height:56px;display:flex;align-items:center;gap:1rem;flex-shrink:0;z-index:20;box-shadow:var(--shadow-sm);}
.brand{display:flex;align-items:center;gap:0.6rem;flex-shrink:0;}
.brand-home{text-decoration:none;color:inherit;transition:opacity 0.12s;-webkit-tap-highlight-color:transparent;}
.brand-home:hover{opacity:0.78;}
.brand-home:active{opacity:0.6;}
.brand-logo{width:30px;height:30px;color:var(--accent);}
.brand-logo svg{width:100%;height:100%;display:block;}
.brand-name{font-size:1.05rem;font-weight:700;letter-spacing:-0.01em;white-space:nowrap;}
.brand-sub{font-size:0.72rem;font-weight:600;color:var(--accent);letter-spacing:0.04em;text-transform:uppercase;padding:0.15rem 0.45rem;background:var(--accent-soft);border:1px solid var(--accent);border-radius:6px;}
.search-wrap{flex:1;max-width:380px;position:relative;}
.search-icon{position:absolute;left:0.7rem;top:50%;transform:translateY(-50%);color:var(--muted2);font-size:0.95rem;pointer-events:none;}
#search{width:100%;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:0.42rem 0.8rem 0.42rem 2.1rem;font-size:0.86rem;transition:all 0.15s;}
#search:focus{outline:none;border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 3px var(--accent-soft);}
.header-right{margin-left:auto;display:flex;align-items:center;gap:0.5rem;}
.nav-link{font-size:0.82rem;font-weight:600;text-decoration:none;color:var(--accent);border:1px solid var(--accent);border-radius:7px;padding:0.32rem 0.78rem;transition:all 0.15s;white-space:nowrap;}
.nav-link:hover{background:var(--accent);color:#fff;}
.nav-link.muted{color:var(--muted);border-color:var(--border2);}
.nav-link.muted:hover{background:var(--surface2);color:var(--text);border-color:var(--muted);}
.count-badge{font-size:0.75rem;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:0.22rem 0.7rem;}

.layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - var(--header-h));}

.sidebar{width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column;}
.sidebar::-webkit-scrollbar{width:6px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.sidebar-top{padding:0.85rem;border-bottom:1px solid var(--border);flex-shrink:0;}
.sidebar-label{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted2);padding:0 0.25rem;margin-bottom:0.4rem;}
.diff-filter{display:flex;gap:0.3rem;margin-top:0.4rem;}
.diff-pill{flex:1;padding:0.32rem 0;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:0.72rem;font-weight:700;text-align:center;border-radius:5px;cursor:pointer;transition:all 0.12s;user-select:none;}
.diff-pill:hover{color:var(--text);}
.diff-pill.diff-A.active{border-color:var(--diff-A);background:var(--diff-A-soft);color:var(--text);}
.diff-pill.diff-B.active{border-color:var(--diff-B);background:var(--diff-B-soft);color:var(--text);}
.diff-pill.diff-C.active{border-color:var(--diff-C);background:var(--diff-C-soft);color:var(--text);}
.diff-pill.diff-D.active{border-color:var(--diff-D);background:var(--diff-D-soft);color:var(--text);}

.cat-group{border-bottom:1px solid var(--border);}
.cat-header{display:flex;align-items:center;gap:0.55rem;padding:0.62rem 0.95rem;cursor:pointer;font-size:0.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;transition:all 0.12s;user-select:none;}
.cat-header > span:nth-child(2){flex:1;min-width:0;word-break:break-word;line-height:1.25;}
.cat-header:hover{color:var(--text);background:var(--surface2);}
.cat-header.open{color:var(--accent);}
.cat-arrow{font-size:0.6rem;transition:transform 0.2s;color:var(--muted2);}
.cat-header.open .cat-arrow{transform:rotate(90deg);color:var(--accent);}
.cat-count{margin-left:auto;font-size:0.68rem;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:0.05rem 0.45rem;color:var(--muted);font-weight:600;}
.cat-items{display:none;padding:0.2rem 0 0.4rem;}
.cat-header.open + .cat-items{display:block;}
.q-link{display:flex;align-items:center;gap:0.4rem;padding:0.45rem 0.95rem 0.45rem 1.7rem;font-size:0.84rem;color:var(--text-soft);cursor:pointer;border-left:3px solid transparent;transition:all 0.12s;}
.q-link:hover{color:var(--text);background:var(--surface2);}
.q-link.active{color:var(--accent);border-left-color:var(--accent);background:var(--accent-soft);font-weight:600;}
.q-link.hidden{display:none;}
.q-link .q-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.diff-badge{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;padding:0 4px;border-radius:3px;font-size:0.62rem;font-weight:700;line-height:1;border:1px solid currentColor;background:transparent;flex-shrink:0;}
.diff-badge.diff-A{color:var(--diff-A);} .diff-badge.diff-B{color:var(--diff-B);} .diff-badge.diff-C{color:var(--diff-C);} .diff-badge.diff-D{color:var(--diff-D);}
.q-link.diff-A:not(.active){border-left-color:var(--diff-A-soft);}
.q-link.diff-B:not(.active){border-left-color:var(--diff-B-soft);}
.q-link.diff-C:not(.active){border-left-color:var(--diff-C-soft);}
.q-link.diff-D:not(.active){border-left-color:var(--diff-D-soft);}
.type-tag{font-size:0.6rem;padding:0.05rem 0.35rem;border-radius:3px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);font-weight:600;text-transform:uppercase;letter-spacing:0.04em;}
.src-tag{font-size:0.58rem;padding:0.05rem 0.3rem;border-radius:3px;background:transparent;color:var(--muted2);border:1px solid var(--border);font-weight:500;flex-shrink:0;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.main::-webkit-scrollbar{width:8px;}
.main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 2rem;text-align:center;}
.welcome-logo{width:96px;height:96px;color:var(--accent);margin-bottom:1.5rem;opacity:0.92;}
.welcome h1{font-size:1.85rem;font-weight:700;margin-bottom:0.55rem;letter-spacing:-0.02em;}
.welcome h1 .red{color:var(--accent);}
.welcome p{color:var(--muted);line-height:1.75;max-width:560px;margin-bottom:2rem;font-size:0.95rem;}
.welcome-stats{display:flex;gap:0.6rem;flex-wrap:wrap;justify-content:center;}
.stat-pill{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:0.6rem 1rem;font-size:0.8rem;color:var(--text-soft);}
.stat-pill b{color:var(--accent);font-size:0.95rem;}

.q-page{padding:1.75rem 2.5rem 3rem;max-width:920px;width:100%;}
.q-breadcrumb{font-size:0.76rem;color:var(--muted);margin-bottom:0.7rem;display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap;}
.q-breadcrumb .sep{color:var(--muted2);}
.q-breadcrumb .cat-name{color:var(--accent);font-weight:600;}
.q-type-badge{font-size:0.66rem;padding:0.1rem 0.5rem;border-radius:4px;background:var(--accent-soft);color:var(--accent);border:1px solid var(--accent);font-weight:700;letter-spacing:0.05em;text-transform:uppercase;}
.q-title{font-size:1.55rem;font-weight:700;margin-bottom:0.2rem;line-height:1.3;letter-spacing:-0.02em;}
.q-source{font-size:0.78rem;color:var(--muted);font-style:italic;margin-bottom:1rem;}
.q-intro{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem 1.2rem;font-size:0.9rem;line-height:1.7;color:var(--text-soft);margin-bottom:1.2rem;}
.q-hints{margin-bottom:1.5rem;}
.q-hints-head{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent);margin-bottom:0.6rem;display:flex;align-items:center;gap:0.5rem;cursor:pointer;user-select:none;}
.q-hints-head::after{content:'';flex:1;height:1px;background:var(--border);}
.q-hints-head .hh-arrow{font-size:0.65rem;transition:transform 0.2s;}
.q-hints.open .hh-arrow{transform:rotate(90deg);}
.q-hints-body{display:none;background:#fffbe8;border-left:3px solid var(--accent2);border-radius:0 8px 8px 0;padding:0.8rem 1.2rem;font-size:0.86rem;line-height:1.7;color:var(--text-soft);}
.q-hints.open .q-hints-body{display:block;}
.q-hints-body ul{list-style:none;display:flex;flex-direction:column;gap:0.3rem;}
.q-hints-body li{padding-left:1em;text-indent:-1em;}
.q-hints-body li::before{content:'• ';color:var(--accent2);font-weight:700;}

/* Step card (synthesis type) */
.step-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:0.9rem;overflow:hidden;box-shadow:var(--shadow-sm);}
.step-head{display:flex;align-items:center;gap:0.7rem;padding:0.75rem 1.1rem;background:var(--surface2);border-bottom:1px solid var(--border);}
.step-num{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;font-size:0.78rem;font-weight:700;flex-shrink:0;}
.step-num.done{background:var(--green);}
.step-title{font-size:0.92rem;font-weight:600;color:var(--text);flex:1;}
.step-arrow{font-size:0.78rem;color:var(--muted);font-family:ui-monospace,monospace;}
.step-body{padding:1rem 1.2rem;}
.step-prompt{font-size:0.9rem;line-height:1.7;color:var(--text);margin-bottom:0.9rem;}
.step-given{background:#fff;border:1px solid var(--border);border-radius:8px;padding:1.2rem 1rem;display:flex;justify-content:center;align-items:center;min-height:120px;margin-bottom:0.9rem;overflow-x:auto;}
.step-given svg{display:block;max-width:100%;height:auto;}
.step-given img{display:block;max-width:100%;height:auto;}
.step-given .ph{font-size:0.85rem;color:var(--muted2);font-style:italic;}

.reveal-btn{background:var(--accent);color:#fff;border:none;padding:0.55rem 1.1rem;border-radius:8px;font-size:0.86rem;font-weight:600;cursor:pointer;transition:all 0.15s;font-family:inherit;display:inline-flex;align-items:center;gap:0.4rem;}
.reveal-btn:hover{background:#c2001a;}
.reveal-btn.sec{background:var(--surface);color:var(--text-soft);border:1px solid var(--border);}
.reveal-btn.sec:hover{background:var(--surface2);border-color:var(--muted);}

.answer-block{display:none;margin-top:0.8rem;background:var(--green-soft);border:1px solid var(--green);border-radius:8px;padding:0.9rem 1rem;}
.step-card.revealed .answer-block,
.mech-step.revealed .answer-block{display:block;}
.step-card.revealed .reveal-btn{display:none;}
.answer-head{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--green);margin-bottom:0.55rem;display:flex;align-items:center;gap:0.5rem;}
.answer-struct{background:#fff;border:1px solid var(--border);border-radius:6px;padding:0.9rem;display:flex;justify-content:center;align-items:center;min-height:110px;overflow-x:auto;}
.answer-struct svg{display:block;max-width:100%;height:auto;}
.answer-struct img{display:block;max-width:100%;height:auto;}
.answer-label{font-size:0.82rem;color:var(--text-soft);margin-top:0.5rem;text-align:center;}
.answer-label .lbl{font-weight:700;color:var(--text);}
.answer-label .formula{font-family:ui-monospace,monospace;color:var(--muted);margin-left:0.4rem;}
.answer-note{font-size:0.78rem;color:var(--text-soft);margin-top:0.5rem;background:#fff;border:1px solid var(--border);border-radius:6px;padding:0.5rem 0.7rem;line-height:1.5;}
.answer-extra{margin-top:0.6rem;display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center;}
.expl-toggle{font-size:0.76rem;color:var(--muted);background:none;border:1px solid var(--border);border-radius:6px;padding:0.25rem 0.6rem;cursor:pointer;font-family:inherit;}
.expl-toggle:hover{color:var(--text);border-color:var(--muted);background:var(--surface);}
.related-link{font-size:0.76rem;color:var(--accent);text-decoration:none;background:var(--surface);border:1px solid var(--accent);border-radius:6px;padding:0.25rem 0.6rem;font-weight:600;}
.related-link:hover{background:var(--accent);color:#fff;}
.expl-body{display:none;margin-top:0.55rem;background:#fff;border:1px solid var(--border);border-radius:6px;padding:0.6rem 0.8rem;font-size:0.82rem;line-height:1.65;color:var(--text-soft);}
.expl-body.open{display:block;}

/* MCQ */
.mcq-choices{display:flex;flex-direction:column;gap:0.6rem;margin-bottom:0.9rem;}
.mcq-choice{background:var(--surface);border:2px solid var(--border);border-radius:10px;padding:0.9rem 1rem;cursor:pointer;transition:all 0.15s;display:flex;gap:0.8rem;align-items:center;}
.mcq-choice:hover{border-color:var(--muted2);transform:translateY(-1px);}
.mcq-choice.selected{border-color:var(--accent);background:var(--accent-soft);}
.mcq-choice.correct{border-color:var(--green);background:var(--green-soft);}
.mcq-choice.wrong{border-color:var(--red);background:var(--red-soft);}
.mcq-choice .struct{flex:1;min-height:60px;display:flex;justify-content:center;align-items:center;background:#fff;border:1px solid var(--border);border-radius:6px;padding:0.4rem;}
.mcq-choice .struct svg{display:block;max-width:100%;height:auto;}
.mcq-choice .lbl{font-size:0.86rem;color:var(--text);min-width:140px;font-weight:500;}
.mcq-choice .marker{width:24px;height:24px;border-radius:50%;border:2px solid var(--border2);font-size:0.78rem;font-weight:700;display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0;}
.mcq-choice.selected .marker{border-color:var(--accent);color:var(--accent);}
.mcq-choice.correct .marker{border-color:var(--green);background:var(--green);color:#fff;}
.mcq-choice.wrong .marker{border-color:var(--red);background:var(--red);color:#fff;}

/* Short answer */
.sa-area{width:100%;min-height:120px;font-family:inherit;font-size:0.9rem;line-height:1.6;padding:0.7rem 0.9rem;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);resize:vertical;}
.sa-area:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
.sa-expected{display:none;margin-top:0.8rem;background:var(--green-soft);border:1px solid var(--green);border-radius:8px;padding:0.9rem 1rem;font-size:0.86rem;line-height:1.6;color:var(--text-soft);white-space:pre-wrap;}
.sa-expected.open{display:block;}
.sa-expected-head{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--green);margin-bottom:0.4rem;}

/* Mechanism walkthrough */
.mech-step{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem 1.2rem;margin-bottom:0.7rem;box-shadow:var(--shadow-sm);}
.mech-step-head{display:flex;align-items:center;gap:0.7rem;margin-bottom:0.6rem;}
.mech-step-num{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;font-size:0.74rem;font-weight:700;display:flex;align-items:center;justify-content:center;}
.mech-step-name{font-size:0.85rem;font-weight:600;color:var(--text);}
.mech-step-prompt{font-size:0.86rem;color:var(--text-soft);margin-bottom:0.6rem;}

/* Top action bar on detail */
.q-actions{display:flex;gap:0.5rem;justify-content:flex-end;margin-bottom:0.8rem;}
.q-actions button{background:var(--surface);border:1px solid var(--border);color:var(--text-soft);padding:0.4rem 0.85rem;border-radius:7px;font-size:0.78rem;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.q-actions button:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}

/* Progress for synthesis */
.q-progress{display:flex;align-items:center;gap:0.6rem;margin-bottom:1rem;font-size:0.78rem;color:var(--muted);}
.q-progress-bar{flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.q-progress-fill{height:100%;background:var(--accent);transition:width 0.25s;}

/* Final reveal card */
.final-card{margin-top:1.5rem;background:var(--surface);border:2px solid var(--accent);border-radius:12px;padding:1.2rem 1.4rem;box-shadow:var(--shadow-md);}
.final-head{font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent);margin-bottom:0.7rem;}
.final-body{display:none;background:#fff;border:1px solid var(--border);border-radius:8px;padding:1.2rem;min-height:120px;justify-content:center;align-items:center;}
.final-card.revealed .final-body{display:flex;}
.final-card.revealed .reveal-btn{display:none;}
.final-name{font-size:0.95rem;font-weight:700;margin-top:0.6rem;text-align:center;}

/* Modular sections — one per "section" inside a composite question */
.q-section{margin-top:1.5rem;padding-top:1.2rem;border-top:1px solid var(--border);}
.q-section:first-child{margin-top:0;padding-top:0;border-top:none;}
.q-section.q-section-intro{margin-top:0.5rem;padding-top:0.5rem;border-top:none;}
.section-header{margin-bottom:0.9rem;}
.section-title{font-size:1.1rem;font-weight:700;color:var(--text);margin-bottom:0.4rem;letter-spacing:-0.01em;display:flex;align-items:center;gap:0.5rem;}
.section-title::before{content:'';width:3px;height:1.1rem;background:var(--accent);border-radius:2px;}
.section-body{font-size:0.92rem;color:var(--text-soft);line-height:1.7;white-space:pre-wrap;}

/* Scheme empty-state (no nodes yet) */
.scheme-empty{padding:3rem 2rem;text-align:center;color:var(--muted);background:var(--surface2);border-radius:8px;border:1px dashed var(--border2);}
.scheme-empty .upl-hint{margin-top:0.5rem;font-size:0.82rem;color:var(--muted2);}
@keyframes reveal-fade { from { background:rgba(255,251,232,0.92);} to { background:transparent;} }

/* Scheme progress + toolbar */
.scheme-toolbar{display:flex;align-items:center;gap:0.7rem;margin-bottom:0.8rem;flex-wrap:wrap;}
.scheme-toolbar .prog{flex:1;min-width:140px;display:flex;align-items:center;gap:0.5rem;font-size:0.78rem;color:var(--muted);}
.scheme-toolbar .prog-bar{flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;min-width:80px;}
.scheme-toolbar .prog-fill{height:100%;background:var(--accent);transition:width 0.25s;}
.scheme-toolbar button{background:var(--surface);border:1px solid var(--border);color:var(--text-soft);padding:0.35rem 0.8rem;border-radius:7px;font-size:0.78rem;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.scheme-toolbar button:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}

/* ── SchemeGraphEditor (viewer mode) — synthesis scheme as SVG graph,
   visually identical to admin's editor (same node sizes, curved arrows,
   layout). The reveal interaction replaces the editor's drag/edit. ─── */
.sg-host{display:flex;flex-direction:column;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--surface);box-shadow:var(--shadow-sm);margin-bottom:1.2rem;}
.sg-toolbar-viewer{display:flex;align-items:center;gap:0.4rem;padding:0.45rem 0.7rem;background:var(--surface2);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.sg-toolbar-viewer .sg-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-soft);padding:0.32rem 0.7rem;border-radius:6px;font-size:0.76rem;cursor:pointer;font-family:inherit;font-weight:600;}
.sg-toolbar-viewer .sg-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}
.sg-toolbar-viewer .sg-zoom-label{font-size:0.7rem;color:var(--muted);font-family:ui-monospace,monospace;padding:0 0.3rem;}
.sg-toolbar-viewer .sg-hint{font-size:0.7rem;color:var(--muted2);margin-left:auto;font-style:italic;max-width:60%;text-align:right;}

.sg-host .sg-canvas{display:block;width:100%;height:480px;background:repeating-linear-gradient(0deg,#fdfcf6 0,#fdfcf6 19px,#f3f2e8 19px,#f3f2e8 20px),repeating-linear-gradient(90deg,#fdfcf6 0,#fdfcf6 19px,#f3f2e8 19px,#f3f2e8 20px);cursor:grab;outline:none;touch-action:none;user-select:none;}
.sg-host .sg-canvas:active{cursor:grabbing;}
.sg-readonly .sg-canvas{cursor:default;}

/* Node styling shared with admin — duplicated here so quiz works
   standalone (admin loads its own copy). */
.sg-node{cursor:pointer;}
.sg-node-bg{fill:#ffffff;stroke:#cfceb8;stroke-width:1.5;}
.sg-node.given .sg-node-bg{fill:#f3f3ec;}
.sg-node.hidden .sg-node-bg{fill:#fffbe8;stroke:#e2001a;stroke-width:2;stroke-dasharray:5 3;}
.sg-readonly .sg-node.hidden:hover .sg-node-bg{fill:rgba(255,251,232,0.6);filter:drop-shadow(0 2px 6px rgba(226,0,26,0.25));}
.sg-node.revealed .sg-node-bg{fill:#fff;stroke:#5a8a2a;stroke-width:1.8;}
.sg-node-label{font:bold 12px 'Segoe UI',system-ui,sans-serif;fill:#e2001a;letter-spacing:0.02em;pointer-events:none;}
.sg-node-name{font:11px 'Segoe UI',system-ui,sans-serif;fill:#6b6a5d;pointer-events:none;}
.sg-q{font:bold 32px 'Segoe UI',system-ui,sans-serif;color:#e2001a;letter-spacing:0;line-height:1;}
.sg-info-badge circle{fill:#5a8a2a;stroke:#fff;stroke-width:2;}
.sg-info-badge text{font:bold 11px 'Segoe UI',system-ui,sans-serif;fill:#fff;pointer-events:none;}
.sg-ph{font:italic 11px 'Segoe UI',system-ui,sans-serif;color:#9a9889;}

.sg-edge-line{stroke:#3a3a35;stroke-width:1.8;fill:none;}
.sg-edge-label{font:500 11px 'Segoe UI',system-ui,sans-serif;fill:#3a3a35;pointer-events:none;}
.sg-edge-label.below{fill:#6b6a5d;font-size:10px;}
.sg-edge-orphan{stroke:#b87a00;}

@keyframes sg-reveal { 0% { transform: scale(0.85); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
.sg-node.revealed .sg-struct-host > svg, .sg-node.revealed .sg-struct-host > img { animation: sg-reveal 0.32s ease-out; }

/* ── Composed scheme (legacy flex-flow) ─ kept for any non-composed
   synthesis questions that haven't been migrated to the SVG viewer ── */
.composed-scheme{background:#fff;border:1px solid var(--border);border-radius:12px;padding:1.2rem 1rem;box-shadow:var(--shadow-sm);margin-bottom:1.2rem;}
.flow{display:flex;flex-wrap:wrap;gap:0.4rem 0.3rem;align-items:stretch;justify-content:flex-start;}
.flow-node{flex:0 0 auto;min-width:160px;max-width:220px;display:flex;flex-direction:column;align-items:center;gap:0.3rem;padding:0.5rem;border:1px solid var(--border);border-radius:8px;background:#fff;cursor:default;transition:all 0.15s;position:relative;}
.flow-node .struct{background:#fff;border-radius:6px;min-height:120px;width:100%;display:flex;justify-content:center;align-items:center;overflow:hidden;}
.flow-node .struct svg{display:block;max-width:100%;height:auto;}
.flow-node .label{font-size:0.78rem;font-weight:700;color:var(--accent);letter-spacing:0.02em;}
.flow-node .name{font-size:0.74rem;color:var(--muted);text-align:center;line-height:1.3;}
.flow-node.given{background:var(--surface2);}
.flow-node.hidden{background:repeating-linear-gradient(45deg, rgba(226,0,26,0.06), rgba(226,0,26,0.06) 6px, rgba(226,0,26,0.14) 6px, rgba(226,0,26,0.14) 12px), rgba(255,251,232,0.9);
  border:2px dashed var(--accent);cursor:pointer;}
.flow-node.hidden:hover{background:rgba(255,251,232,0.7);box-shadow:0 0 0 3px var(--accent-soft);transform:translateY(-1px);}
.flow-node.hidden .struct{display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:2rem;font-weight:700;line-height:1;}
.flow-node.hidden .name{visibility:hidden;}
.flow-node.revealed{border:2px solid var(--green);background:#fff;animation:reveal-fade 0.35s ease-out;}
.flow-node .info-btn{position:absolute;top:-9px;right:-9px;width:22px;height:22px;border-radius:50%;background:var(--green);color:#fff;font-size:0.78rem;font-weight:700;display:none;align-items:center;justify-content:center;border:2px solid #fff;cursor:pointer;box-shadow:var(--shadow-sm);}
.flow-node.revealed .info-btn{display:flex;}
.flow-node .info-btn:hover{background:#3d6818;}

/* Arrow between two nodes (horizontal). The reagent labels sit above/below. */
.flow-arrow{flex:0 0 auto;align-self:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.15rem;min-width:80px;padding:0.2rem 0.3rem;font-size:0.74rem;color:var(--text-soft);}
.flow-arrow .rl-above{text-align:center;font-weight:500;line-height:1.25;min-height:1em;max-width:120px;}
.flow-arrow .rl-below{text-align:center;color:var(--muted);font-size:0.7rem;line-height:1.2;min-height:0.9em;max-width:120px;}
.flow-arrow .arrow-line{width:64px;height:2px;background:var(--text-soft);position:relative;}
.flow-arrow .arrow-line::after{content:'';position:absolute;right:-1px;top:50%;transform:translateY(-50%);border-left:8px solid var(--text-soft);border-top:5px solid transparent;border-bottom:5px solid transparent;}
.flow-arrow.merge{position:relative;}
.flow-arrow.merge::before{content:'+';position:absolute;left:-12px;top:50%;transform:translateY(-50%);font-weight:700;color:var(--muted);}

/* Row break in the flow — visual chevron showing zigzag continuation */
.flow-break{flex-basis:100%;height:0;}
.flow-uturn{display:flex;align-items:center;justify-content:center;font-size:0.9rem;color:var(--muted2);padding:0.3rem 0;}

/* Info panel for composed nodes (reused styling from overlay) */
.composed-info{position:fixed;right:1.5rem;bottom:1.5rem;background:#fff;border:1px solid var(--green);border-radius:10px;padding:0.85rem 1rem;width:300px;box-shadow:0 6px 24px rgba(60,55,40,0.18);font-size:0.85rem;z-index:50;display:none;}
.composed-info.open{display:block;animation:slide-in 0.2s ease-out;}
.composed-info-head{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--green);margin-bottom:0.35rem;}
.composed-info-name{font-weight:700;color:var(--text);margin-bottom:0.4rem;}
.composed-info-expl{color:var(--text-soft);line-height:1.55;margin-bottom:0.5rem;font-size:0.82rem;}
.composed-info-close{position:absolute;top:5px;right:8px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;line-height:1;}
.composed-info-close:hover{color:var(--red);}
.composed-info-actions{display:flex;gap:0.4rem;flex-wrap:wrap;align-items:center;}
@keyframes slide-in { from { transform: translateY(20px); opacity:0; } to { transform: translateY(0); opacity:1; } }

/* ════════════════════════════════════════════════════════════════════
   MOBILE (≤ 760px) — comprehensive responsive overrides
   ════════════════════════════════════════════════════════════════════ */
@media(max-width:760px){
  :root{--header-h:94px;}

  /* Header: two-row layout — brand + actions on row 1, search full-width on row 2 */
  header{flex-wrap:wrap;row-gap:0.45rem;padding:0.5rem 0.85rem;height:auto;min-height:56px;
    padding-top:max(0.5rem, env(safe-area-inset-top));align-items:center;}
  .brand{gap:0.5rem;}
  .brand-name{font-size:0.95rem;}
  .brand-sub{display:none;}
  .search-wrap{flex-basis:100%;order:10;max-width:none;}
  #search{padding:0.5rem 0.8rem 0.5rem 2.1rem;font-size:0.92rem;border-radius:9px;}
  .header-right{gap:0.3rem;margin-left:auto;}
  .count-badge{display:none;}
  .nav-link{font-size:0.74rem;padding:0.32rem 0.55rem;min-height:32px;display:inline-flex;align-items:center;}
  .hamburger{display:flex;align-items:center;justify-content:center;width:38px;height:38px;
    border:1px solid var(--border);border-radius:8px;background:var(--surface);cursor:pointer;
    color:var(--text);font-size:1.18rem;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
  .hamburger:active{background:var(--surface2);}

  /* Sidebar drawer — uses transform for smoother GPU-accelerated slide */
  .sidebar{position:fixed;left:0;top:var(--header-h);
    height:calc(100vh - var(--header-h));z-index:30;
    transform:translateX(-100%);transition:transform 0.22s ease-out;
    width:min(310px,88vw);box-shadow:var(--shadow-md);will-change:transform;}
  .sidebar.open{transform:translateX(0);}
  .overlay{top:var(--header-h);}

  /* Welcome */
  .welcome{padding:1.75rem 1.1rem;}
  .welcome-logo{width:72px;height:72px;margin-bottom:1rem;}
  .welcome h1{font-size:1.45rem;}
  .welcome p{font-size:0.88rem;max-width:100%;margin-bottom:1.4rem;}
  .welcome-stats{gap:0.4rem;}
  .stat-pill{padding:0.45rem 0.75rem;font-size:0.74rem;}

  /* Question page — reduced padding, room for bottom-sheet */
  .q-page{padding:0.85rem 0.85rem 5rem;}
  .q-title{font-size:1.25rem;line-height:1.25;}
  .q-source{font-size:0.74rem;}
  .q-intro{padding:0.75rem 0.9rem;font-size:0.86rem;line-height:1.6;border-radius:8px;}
  .q-breadcrumb{font-size:0.72rem;gap:0.3rem;}

  /* Section headers */
  .section-header{font-size:0.95rem;}

  /* Scheme toolbar */
  .scheme-toolbar{gap:0.4rem;}
  .scheme-toolbar button{padding:0.42rem 0.7rem;font-size:0.74rem;}
  .scheme-toolbar .prog{font-size:0.72rem;min-width:120px;}

  /* SYNTHESIS FLOW — horizontal scroll instead of wrap */
  .composed-scheme{padding:0.85rem 0.45rem 1rem;position:relative;
    /* fade-out edge hint to suggest scrollability */
    -webkit-mask-image:linear-gradient(90deg,transparent 0,#000 12px,#000 calc(100% - 12px),transparent 100%);
    mask-image:linear-gradient(90deg,transparent 0,#000 12px,#000 calc(100% - 12px),transparent 100%);}
  .flow{flex-wrap:nowrap;overflow-x:auto;overflow-y:visible;padding:6px 0.5rem 0.5rem;
    gap:0.3rem 0.25rem;scroll-snap-type:x proximity;-webkit-overflow-scrolling:touch;
    scrollbar-width:thin;}
  .flow::-webkit-scrollbar{height:5px;}
  .flow::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
  .flow-node{min-width:140px;max-width:160px;scroll-snap-align:center;flex:0 0 auto;}
  .flow-node .struct{min-height:100px;}
  .flow-node .label{font-size:0.74rem;}
  .flow-node .name{font-size:0.7rem;}
  .flow-arrow{min-width:62px;font-size:0.7rem;}
  .flow-arrow .arrow-line{width:46px;}
  .flow-arrow .rl-above,.flow-arrow .rl-below{max-width:80px;font-size:0.68rem;}
  .flow-break{display:none;} /* disable forced zigzag row-break on mobile */
  .flow-uturn{display:none;}

  /* Composed info → bottom-sheet on mobile */
  .composed-info{position:fixed;left:0;right:0;bottom:0;top:auto;width:auto;
    max-height:72vh;overflow-y:auto;border-radius:14px 14px 0 0;
    border:1px solid var(--green);border-bottom:none;
    padding:1rem 1.1rem 1.25rem;
    padding-bottom:calc(1.25rem + env(safe-area-inset-bottom));
    box-shadow:0 -10px 32px rgba(60,55,40,0.22);}
  .composed-info-close{top:8px;right:12px;font-size:1.5rem;padding:4px 10px;line-height:1;}
  .composed-info-head{font-size:0.78rem;}
  .composed-info-name{font-size:1rem;}
  .composed-info-expl{font-size:0.88rem;line-height:1.6;}

  /* MCQ choices: tap-friendly */
  .mcq-choice{padding:0.7rem 0.85rem;min-height:48px;}
  .mcq-choice .lbl{min-width:0;font-size:0.88rem;}

  /* Hide answer-struct overflow gracefully */
  .answer-struct{padding:0.6rem;}
}

/* Tiny phones (≤ 380px) */
@media(max-width:380px){
  .nav-link{padding:0.3rem 0.45rem;font-size:0.7rem;}
  .brand-name{font-size:0.85rem;}
  .brand-logo{width:26px;height:26px;}
  .hamburger{width:36px;height:36px;}
  .flow-node{min-width:128px;max-width:144px;}
  .flow-arrow{min-width:54px;}
  .flow-arrow .arrow-line{width:36px;}
  .welcome h1{font-size:1.3rem;}
}

@media(min-width:761px){.hamburger{display:none;}}
.overlay{display:none;position:fixed;inset:0;background:rgba(60,55,40,0.35);z-index:25;}
.overlay.open{display:block;}
</style>
</head>
<body>

<header>
  <button class="hamburger" onclick="toggleSidebar()" aria-label="Menü">☰</button>
  <a href="./index.html" class="brand brand-home" title="Zur Startseite — Reaktions-Referenz">
    <div class="brand-logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="14 52 174 187"><path fill="#ff0000" d="M 153.27953,54.242684 141.3862,76.472852 73.360897,76.250643 39.904024,139.16308 16.228467,139.27419 v 13.11599 l 23.452832,0.22273 34.124015,62.80081 68.025306,0.11111 11.33781,21.56406 10.67067,-6.55826 -11.67113,-22.11958 33.79071,-62.80082 -34.12402,-62.801331 12.11554,-21.897371 z m -12.0804,35.318258 30.29893,56.472008 -30.37747,56.07874 -60.322938,0.1571 -30.220377,-56.35367 30.220377,-56.27563 z m 13.04727,56.216728 -22.51801,41.95092 3.81166,2.31872 22.518,-41.87289 c 0,0 2.9e-4,-0.0192 -3.81165,-2.39675 z"/></svg>
    </div>
    <span class="brand-name">OC Quiz</span>
    <span class="brand-sub">ÖChO</span>
  </a>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input id="search" type="text" placeholder="Fragen suchen…" oninput="globalSearch(this.value)" autocomplete="off">
  </div>
  <a href="./index.html" class="nav-link muted">Referenz</a>
  <a href="./admin.html" class="nav-link muted">Admin</a>
  <div class="header-right">
    <span class="count-badge" id="count-badge">— Fragen</span>
  </div>
</header>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="layout">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-label">Schwierigkeit</div>
      <div class="diff-filter" id="diff-filter">
        <div class="diff-pill diff-A active" data-diff="A" onclick="toggleDiff('A')" title="Einsteiger/innen">A</div>
        <div class="diff-pill diff-B active" data-diff="B" onclick="toggleDiff('B')" title="LW / JÖChO">B</div>
        <div class="diff-pill diff-C active" data-diff="C" onclick="toggleDiff('C')" title="BW">C</div>
        <div class="diff-pill diff-D active" data-diff="D" onclick="toggleDiff('D')" title="Spezial">D</div>
      </div>
      <div class="sidebar-label" style="margin-top:0.85rem">Kategorien</div>
    </div>
    <div id="cat-list"></div>
  </nav>

  <main class="main" id="main"></main>
</div>

<script>
let questions = [];
let reactionsIdx = {};  // id → reaction (for related-reaction tooltips)
let activeId = null;
let diffFilter = new Set(['A','B','C','D']);

const TYPE_LABEL = {
  synthesis: 'Synthese',
  multiple_choice: 'Multiple Choice',
  short_answer: 'Theorie',
  mechanism: 'Mechanismus'
};

const LOGO_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="14 52 174 187"><path fill="#ff0000" d="M 153.27953,54.242684 141.3862,76.472852 73.360897,76.250643 39.904024,139.16308 16.228467,139.27419 v 13.11599 l 23.452832,0.22273 34.124015,62.80081 68.025306,0.11111 11.33781,21.56406 10.67067,-6.55826 -11.67113,-22.11958 33.79071,-62.80082 -34.12402,-62.801331 12.11554,-21.897371 z m -12.0804,35.318258 30.29893,56.472008 -30.37747,56.07874 -60.322938,0.1571 -30.220377,-56.35367 30.220377,-56.27563 z m 13.04727,56.216728 -22.51801,41.95092 3.81166,2.31872 22.518,-41.87289 c 0,0 2.9e-4,-0.0192 -3.81165,-2.39675 z"/></svg>`;

function x(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

async function init() {
  try {
    questions = await fetch('./data/questions.json').then(r => r.json());
  } catch(e) {
    showError('Fragen konnten nicht geladen werden. Bei lokaler Nutzung Server starten: <code>node server.js</code>');
    return;
  }
  try {
    const rxns = await fetch('./data/reactions.json').then(r => r.json());
    rxns.forEach(r => reactionsIdx[r.id] = r);
  } catch {}
  document.getElementById('count-badge').textContent = questions.length + ' Fragen';
  buildSidebar();
  showWelcome();
  const hash = location.hash.slice(1);
  if (hash) { const q = questions.find(x => x.id === hash); if (q) showQuestion(hash); }
}

/* ── Primary-type classification for sidebar grouping ────────────────
   A "composed" question (has `sections: []`) is classified by its
   most prominent section type. Order of precedence: synthesis →
   mechanism → multiple_choice → short_answer. Non-composed questions
   use their plain `q.type` field. */
function qPrimaryType(q) {
  if (Array.isArray(q.sections) && q.sections.length) {
    const types = q.sections.map(s => s.type);
    if (types.includes('synthesis'))       return 'synthesis';
    if (types.includes('mechanism'))       return 'mechanism';
    if (types.includes('multiple_choice')) return 'multiple_choice';
    if (types.includes('short_answer'))    return 'short_answer';
    return 'composed';
  }
  return q.type || 'composed';
}

/* Display order + labels for the four primary type-groups. */
const TYPE_GROUP_ORDER = ['synthesis', 'mechanism', 'multiple_choice', 'short_answer'];
const TYPE_GROUP_LABEL = {
  synthesis:       'Synthese-Aufgaben',
  mechanism:       'Mechanismen',
  multiple_choice: 'Multiple Choice',
  short_answer:    'Theorie / Kurzantwort',
  composed:        'Sonstige'
};

function qVisible(q) {
  return !q.difficulty || diffFilter.has(q.difficulty);
}

function buildSidebar() {
  // Group questions by primary type instead of free-form category.
  const groups = {};
  for (const q of questions) {
    const t = qPrimaryType(q);
    (groups[t] = groups[t] || []).push(q);
  }
  // Render in the canonical order, then any unknown types alphabetically.
  const orderedTypes = [
    ...TYPE_GROUP_ORDER.filter(t => groups[t]),
    ...Object.keys(groups).filter(t => !TYPE_GROUP_ORDER.includes(t)).sort()
  ];

  document.getElementById('cat-list').innerHTML = orderedTypes.map(typeKey => {
    const items = groups[typeKey];
    const label = TYPE_GROUP_LABEL[typeKey] || typeKey;
    const visibleN = items.filter(qVisible).length;
    return `<div class="cat-group" data-cat="${x(typeKey)}"${visibleN===0?' style="display:none"':''}>
      <div class="cat-header" onclick="toggleCat(this)">
        <span class="cat-arrow">▶</span>
        <span>${x(label)}</span>
        <span class="cat-count">${visibleN}</span>
      </div>
      <div class="cat-items">
        ${items.map(q => {
          const d = q.difficulty || '';
          const badge = d ? `<span class="diff-badge diff-${d}">${d}</span>` : '';
          const hidden = !qVisible(q) ? ' hidden' : '';
          const diffCls = d ? ' diff-'+d : '';
          return `<div class="q-link${diffCls}${hidden}" id="link-${x(q.id)}" onclick="showQuestion('${x(q.id)}')">${badge}<span class="q-name">${x(q.name)}</span></div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function toggleDiff(d) {
  const pill = document.querySelector(`.diff-pill[data-diff="${d}"]`);
  if (diffFilter.has(d)) { diffFilter.delete(d); pill.classList.remove('active'); }
  else                   { diffFilter.add(d);    pill.classList.add('active');    }
  buildSidebar();
}
function toggleCat(h) { h.classList.toggle('open'); }
function openSidebarFor(id) {
  const link = document.getElementById('link-'+id);
  if (!link) return;
  const header = link.closest('.cat-group')?.querySelector('.cat-header');
  if (header) header.classList.add('open');
  setTimeout(() => link.scrollIntoView({block:'nearest',behavior:'smooth'}), 50);
}

function showWelcome() {
  const byType = {};
  questions.forEach(q => { byType[q.type] = (byType[q.type]||0) + 1; });
  const statsHtml = Object.entries(byType).map(([t,n]) =>
    `<div class="stat-pill"><b>${n}</b> ${TYPE_LABEL[t]||t}</div>`
  ).join('');
  document.getElementById('main').innerHTML = `
    <div class="welcome">
      <div class="welcome-logo">${LOGO_SVG}</div>
      <h1>OC <span class="red">Quiz</span></h1>
      <p>Interaktive Aufgaben rund um organische Chemie: mehrstufige Synthesen mit schrittweisem Lösungspfad, Regioselektivität, Mechanismen und Theorie. Jede Lösung verlinkt zurück auf die passende Reaktion in der Referenz.</p>
      <div class="welcome-stats">${statsHtml}</div>
    </div>`;
}

/* ── Renderers per type ──────────────────────────────────────────── */

function renderGiven(g, slot) {
  // g: { smiles?, image?, reagent_label?, reagent_label_below? }
  if (!g) return '<div class="ph">Keine Struktur angegeben</div>';
  if (g.image) {
    return `<img src="${g.image}" alt="Vorlage">`;
  }
  if (g.smiles) {
    const id = 'given-svg-'+slot;
    // If the SMILES has no '>>' but a reagent label is present, render as a
    // half-reaction (reactants > reagent > nothing) so the arrow+label shows.
    let smi = g.smiles;
    const hasArrow = smi.includes('>');
    const wantsArrow = !!(g.reagent_label || g.reagent_label_below);
    if (!hasArrow && wantsArrow) smi = smi + '>>';
    const isReaction = smi.includes('>');
    setTimeout(() => {
      const el = document.getElementById(id);
      if (!el) return;
      if (isReaction) ReactionRenderer.draw(smi, el, 'light', g.reagent_label || '{reagents}', g.reagent_label_below || '');
      else            ReactionRenderer.drawMolecule(smi, el, 'light');
    }, 0);
    return `<svg id="${id}" xmlns="http://www.w3.org/2000/svg"></svg>`;
  }
  return '<div class="ph">Keine Struktur angegeben</div>';
}

function renderAnswerStruct(a, slot) {
  if (!a) return '<div class="ph">Keine Struktur angegeben</div>';
  if (a.image) return `<img src="${a.image}" alt="Lösung">`;
  if (a.smiles) {
    const id = 'ans-svg-'+slot;
    const isReaction = a.smiles.includes('>');
    setTimeout(() => {
      const el = document.getElementById(id);
      if (!el) return;
      if (isReaction) ReactionRenderer.draw(a.smiles, el, 'light', '', '');
      else            ReactionRenderer.drawMolecule(a.smiles, el, 'light');
    }, 0);
    return `<svg id="${id}" xmlns="http://www.w3.org/2000/svg"></svg>`;
  }
  return '<div class="ph">Keine Struktur angegeben</div>';
}

function relatedLink(id) {
  if (!id) return '';
  const r = reactionsIdx[id];
  const label = r ? r.name : id;
  return `<a class="related-link" href="./index.html#${x(id)}" title="${r ? x(r.category) : ''}">→ ${x(label)}</a>`;
}

function explanationToggle(slot, expl) {
  if (!expl) return '';
  return `<button class="expl-toggle" onclick="toggleExpl('${slot}')">Erläuterung</button>
    <div class="expl-body" id="expl-${slot}">${x(expl)}</div>`;
}
window.toggleExpl = function(slot) {
  const el = document.getElementById('expl-'+slot);
  if (el) el.classList.toggle('open');
};

function renderSynthesis(q) {
  return renderComposedScheme(q, q.scheme || {});
}

// resetReveals: shared by composed (replaces the overlay-only definition).
window.resetReveals = function(qid) { showQuestion(qid); };

/* ── Composed-mode synthesis: SVG graph viewer (same visuals as admin) ──
   Mounts a SchemeGraphEditor in readOnly mode. The editor handles
   layout (using saved x/y if present, BFS-layered fallback otherwise),
   curved edges, and pan/zoom. We wire `onNodeClick` to the existing
   reveal + info-popup logic.

   The OLD flex-flow renderer is preserved below the new code (function
   `renderComposedSchemeLegacy`) as a defensive fallback in case
   SchemeGraphEditor is unavailable. */

// Track active viewer instance(s) per question so we can clean up on
// re-show and so the toolbar's "Reveal all" / "Reset" buttons can
// drive the right editor. Keyed by question id.
const _quizGraphViewers = {};

function renderComposedScheme(q, scheme) {
  const nodes = scheme.nodes || [];
  const edges = scheme.edges || [];
  if (!nodes.length) {
    return `<div class="composed-scheme"><div class="scheme-empty">
      <strong>Noch keine Strukturen.</strong>
      <div class="upl-hint">Im Admin → Quiz → diese Frage öffnen → Knoten anlegen (mit MOL- oder SMILES-Daten) und mit Pfeilen verbinden.</div>
    </div></div>`;
  }

  // Defensive fallback if the editor module didn't load
  if (typeof window.SchemeGraphEditor !== 'function') {
    return renderComposedSchemeLegacy(q, scheme);
  }

  const hiddenCount = nodes.filter(n => !n.given).length;
  const containerId = 'sg-view-' + q.id;
  // Info popups (one per hidden node) — same structure as before so we
  // can reuse the existing CSS + open/close handlers.
  const infoPanels = nodes.filter(n => !n.given).map(n => {
    const slot = q.id + '-n-' + n.id;
    return `<div class="composed-info" id="info-${x(slot)}">
      <button class="composed-info-close" onclick="closeNodeInfo('${x(slot)}')">×</button>
      <div class="composed-info-head">${x(n.label || n.id)} aufgedeckt</div>
      ${n.name ? `<div class="composed-info-name">${x(n.name)}</div>` : ''}
      ${n.explanation ? `<div class="composed-info-expl">${x(n.explanation)}</div>` : ''}
      ${n.note ? `<div class="composed-info-expl" style="font-style:italic;color:var(--muted)">${x(n.note)}</div>` : ''}
      <div class="composed-info-actions">${relatedLink(n.related_reaction_id)}</div>
    </div>`;
  }).join('');

  // Mount the editor right after DOM insertion
  setTimeout(() => {
    const container = document.getElementById(containerId);
    if (!container) return;
    // Tear down any previous viewer for this question
    if (_quizGraphViewers[q.id]) { try { _quizGraphViewers[q.id].destroy(); } catch (_) {} }
    const viewer = new window.SchemeGraphEditor(container, scheme, {
      readOnly: true,
      onNodeClick: (n) => onQuizNodeClick(q.id, n)
    });
    _quizGraphViewers[q.id] = viewer;
    // First-paint: fit to content so the whole synthesis is visible
    requestAnimationFrame(() => viewer.fitToContent());
    // Re-run fit once on next frame in case fonts / SVG layouts settled later
    setTimeout(() => viewer.fitToContent(), 250);
    updateQuizProgress(q.id);
  }, 0);

  // Toolbar (progress, reveal-all, reset) sits above the canvas
  const toolbar = `<div class="scheme-toolbar">
    <div class="prog"><span id="prog-text-${x(q.id)}">0 / ${hiddenCount} aufgedeckt</span>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill-${x(q.id)}" style="width:0%"></div></div>
    </div>
    <button onclick="quizRevealAll('${x(q.id)}')">Alle aufdecken</button>
    <button onclick="quizResetReveals('${x(q.id)}')">Zurücksetzen</button>
  </div>`;

  return toolbar
    + `<div id="${containerId}" class="sg-viewer-host"></div>`
    + infoPanels;
}

/* Click handler for a quiz node: hidden → reveal with animation;
   already-revealed or given → show the info popup. */
window.onQuizNodeClick = function(qid, node) {
  const v = _quizGraphViewers[qid];
  if (!v) return;
  const isHidden = !node.given && !v.revealedIds.has(node.id);
  if (isHidden) {
    v.setRevealed(node.id, true);
    updateQuizProgress(qid);
    // Auto-open info popup so user gets immediate feedback
    openNodeInfo(qid + '-n-' + node.id);
  } else {
    // Revealed or given — show info if we have anything to say
    if (!node.given) openNodeInfo(qid + '-n-' + node.id);
  }
};

window.quizRevealAll = function(qid) {
  const v = _quizGraphViewers[qid];
  if (!v) return;
  for (const n of v.scheme.nodes) {
    if (!n.given) v.revealedIds.add(n.id);
  }
  v.refresh();
  updateQuizProgress(qid);
};

window.quizResetReveals = function(qid) {
  const v = _quizGraphViewers[qid];
  if (!v) return;
  v.resetReveals();
  updateQuizProgress(qid);
  // Close any open info panels
  document.querySelectorAll('.composed-info.open').forEach(el => el.classList.remove('open'));
};

function updateQuizProgress(qid) {
  const v = _quizGraphViewers[qid];
  if (!v) return;
  const c = v.countHidden();
  const txt = document.getElementById('prog-text-' + qid);
  const bar = document.getElementById('prog-fill-' + qid);
  if (txt) txt.textContent = `${c.revealed} / ${c.total} aufgedeckt`;
  if (bar) bar.style.width = (c.total ? (c.revealed / c.total * 100) : 0) + '%';
}

/* Legacy flex-flow renderer kept as a defensive fallback. Identical
   to the implementation that existed before the SVG viewer migration. */
function renderComposedSchemeLegacy(q, scheme) {
  const nodes = scheme.nodes || [];
  const edges = scheme.edges || [];
  if (!nodes.length) {
    return `<div class="composed-scheme"><div class="scheme-empty">
      <strong>Noch keine Strukturen.</strong>
    </div></div>`;
  }

  // Index nodes by id for edge lookup
  const nodeById = Object.fromEntries(nodes.map(n => [n.id, n]));
  const hiddenCount = nodes.filter(n => !n.given).length;

  // Build the flowchart linearly: walk edges in order, emit "fromNode arrow toNode".
  // Multi-input edges (from: [A,B] → C) show A "+" B above the arrow.
  // Nodes that appear as the source of the next edge after appearing as
  // a target are NOT re-emitted — they're already in the DOM. To allow
  // arbitrary DAGs we'd need a layered layout; for the typical linear
  // synthesis (1-in/1-out plus occasional join) this rendering is fine.
  const placed = new Set();
  const parts = [];

  function nodeHtml(n) {
    const slot = q.id + '-n-' + n.id;
    if (n.given) {
      return `<div class="flow-node given" id="node-${x(slot)}">
        <div class="struct" id="struct-${x(slot)}" data-input="${x(n.mol || n.smiles || '')}" data-ismol="${n.mol?1:0}"></div>
        <div class="label">${x(n.label || n.id)}</div>
        <div class="name">${x(n.name || '')}</div>
      </div>`;
    }
    // Embed the structure data on the DOM so revealNode doesn't need to
    // walk the global `questions` array — sections can then carry their
    // own node data independently of the parent-question lookup.
    return `<div class="flow-node hidden" id="node-${x(slot)}" data-slot="${x(slot)}"
                data-input="${x(n.mol || n.smiles || '')}" data-ismol="${n.mol?1:0}"
                onclick="revealNode('${x(slot)}')">
      <div class="struct"><span>?</span></div>
      <div class="label">${x(n.label || n.id)}</div>
      <div class="name">${x(n.name || '')}</div>
      <div class="info-btn" onclick="event.stopPropagation();openNodeInfo('${x(slot)}')">i</div>
    </div>`;
  }

  function arrowHtml(edge) {
    const above = edge.reagent_above || '';
    const below = edge.reagent_below || '';
    return `<div class="flow-arrow">
      <div class="rl-above">${renderLatexLabel(above)}</div>
      <div class="arrow-line"></div>
      <div class="rl-below">${renderLatexLabel(below)}</div>
    </div>`;
  }

  // Place first edge's left side(s), then walk
  if (edges.length === 0) {
    // No edges — just render nodes in a row
    nodes.forEach(n => { parts.push(nodeHtml(n)); placed.add(n.id); });
  } else {
    edges.forEach((edge, i) => {
      const fromIds = edge.from || [];
      // Emit any unplaced "from" nodes (joined with + arrows for multi-input)
      fromIds.forEach((fid, idx) => {
        const fn = nodeById[fid];
        if (!fn) return;
        if (!placed.has(fid)) { parts.push(nodeHtml(fn)); placed.add(fid); }
        if (idx < fromIds.length - 1) {
          parts.push(`<div class="flow-arrow" style="min-width:30px"><div class="rl-above"></div><div style="font-weight:700;color:var(--muted);font-size:1rem;line-height:1">+</div><div class="rl-below"></div></div>`);
        }
      });
      parts.push(arrowHtml(edge));
      const tn = nodeById[edge.to];
      if (tn && !placed.has(edge.to)) { parts.push(nodeHtml(tn)); placed.add(edge.to); }
    });
    // Append any nodes not referenced by any edge
    nodes.forEach(n => { if (!placed.has(n.id)) parts.push(nodeHtml(n)); });
  }

  // Info panels for hidden nodes
  const infoPanels = nodes.filter(n => !n.given).map(n => {
    const slot = q.id + '-n-' + n.id;
    return `<div class="composed-info" id="info-${x(slot)}">
      <button class="composed-info-close" onclick="closeNodeInfo('${x(slot)}')">×</button>
      <div class="composed-info-head">${x(n.label || n.id)} aufgedeckt</div>
      ${n.name ? `<div class="composed-info-name">${x(n.name)}</div>` : ''}
      ${n.explanation ? `<div class="composed-info-expl">${x(n.explanation)}</div>` : ''}
      ${n.note ? `<div class="composed-info-expl" style="font-style:italic;color:var(--muted)">${x(n.note)}</div>` : ''}
      <div class="composed-info-actions">${relatedLink(n.related_reaction_id)}</div>
    </div>`;
  }).join('');

  // Toolbar
  const toolbar = `<div class="scheme-toolbar">
    <div class="prog"><span id="prog-text">0 / ${hiddenCount} aufgedeckt</span>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <button onclick="revealAllNodes('${x(q.id)}')">Alle aufdecken</button>
    <button onclick="resetReveals('${x(q.id)}')">Zurücksetzen</button>
  </div>`;

  // Defer structure rendering until OCL is loaded
  setTimeout(() => renderAllStructures(q.id), 0);

  return toolbar
    + `<div class="composed-scheme"><div class="flow">${parts.join('')}</div></div>`
    + infoPanels;
}

/* Render every given/revealed structure via OCL. Called after the
   composed scheme HTML is in the DOM. */
async function renderAllStructures(qid) {
  await MolRenderer.ready();
  document.querySelectorAll('.flow-node.given .struct, .flow-node.revealed .struct').forEach(el => {
    if (el.dataset.rendered === '1') return;
    const input = el.dataset.input;
    if (!input) return;
    const isMol = el.dataset.ismol === '1' || MolRenderer.isMol(input);
    if (isMol) MolRenderer.drawMol(input, el, { width: 180, height: 130 });
    else       MolRenderer.drawSmiles(input, el, { width: 180, height: 130 });
    el.dataset.rendered = '1';
  });
}

/* LaTeX-style sub/superscript for reagent labels — reuses the converter
   from reaction-drawer.js if available, else passes through. */
function renderLatexLabel(s) {
  if (!s) return '';
  // Use ReactionRenderer's converter if available (it's defined as a closure
  // private fn; we replicate the common subset here).
  return x(s)
    .replace(/_\{([^}]+)\}/g, (_, t) => '<sub>'+t+'</sub>')
    .replace(/\^\{([^}]+)\}/g, (_, t) => '<sup>'+t+'</sup>')
    .replace(/_([A-Za-z0-9+\-=])/g,  (_, t) => '<sub>'+t+'</sub>')
    .replace(/\^([A-Za-z0-9+\-=])/g, (_, t) => '<sup>'+t+'</sup>');
}

window.revealNode = function(slot) {
  const n = document.getElementById('node-'+slot);
  if (!n || n.classList.contains('revealed')) return;
  n.classList.remove('hidden');
  n.classList.add('revealed');
  // Read structure data from the DOM (embedded on the node element itself).
  // No dependency on the global `questions` array — works for sections too.
  const input = n.dataset.input || '';
  const isMol = n.dataset.ismol === '1';
  const struct = n.querySelector('.struct');
  if (struct && input) {
    struct.innerHTML = '';
    struct.dataset.input = input;
    struct.dataset.ismol = isMol ? '1' : '0';
    struct.dataset.rendered = '';
    struct.style.fontSize = '';
    struct.style.color = '';
    (async () => {
      await MolRenderer.ready();
      if (isMol) MolRenderer.drawMol(input, struct, { width: 180, height: 130 });
      else       MolRenderer.drawSmiles(input, struct, { width: 180, height: 130 });
      struct.dataset.rendered = '1';
    })();
  }
  n.onclick = null;
  openNodeInfo(slot);
  updateComposedProgress();
};
window.openNodeInfo = function(slot) {
  document.querySelectorAll('.composed-info.open').forEach(el => el.classList.remove('open'));
  const info = document.getElementById('info-'+slot);
  if (info) info.classList.add('open');
};
window.closeNodeInfo = function(slot) {
  const info = document.getElementById('info-'+slot);
  if (info) info.classList.remove('open');
};
window.revealAllNodes = function(qid) {
  document.querySelectorAll('.flow-node.hidden').forEach(n => {
    const slot = n.dataset.slot;
    if (slot) revealNode(slot);
  });
  document.querySelectorAll('.composed-info.open').forEach(el => el.classList.remove('open'));
};
function updateComposedProgress() {
  const total = document.querySelectorAll('.flow-node.hidden, .flow-node.revealed').length;
  const done  = document.querySelectorAll('.flow-node.revealed').length;
  const fill = document.getElementById('prog-fill');
  const txt  = document.getElementById('prog-text');
  if (fill) fill.style.width = total ? (done/total*100)+'%' : '0%';
  if (txt)  txt.textContent  = `${done} / ${total} aufgedeckt`;
}


function renderMCQ(q) {
  const choicesHtml = (q.choices||[]).map((c, i) => {
    const slot = q.id+'-c-'+i;
    let structHtml = '';
    if (c.image) structHtml = `<img src="${c.image}" alt="">`;
    else if (c.smiles) {
      const isReaction = c.smiles.includes('>');
      setTimeout(() => {
        const el = document.getElementById('mcq-svg-'+slot);
        if (!el) return;
        if (isReaction) ReactionRenderer.draw(c.smiles, el, 'light', '', '');
        else            ReactionRenderer.drawMolecule(c.smiles, el, 'light');
      }, 0);
      structHtml = `<svg id="mcq-svg-${slot}" xmlns="http://www.w3.org/2000/svg"></svg>`;
    }
    const marker = String.fromCharCode(65+i);
    return `<div class="mcq-choice" data-correct="${c.correct?1:0}" data-i="${i}" onclick="pickMCQ(this, '${q.id}')">
      <div class="marker">${marker}</div>
      <div class="lbl">${x(c.label||'')}</div>
      <div class="struct">${structHtml}</div>
    </div>`;
  }).join('');

  const givenHtml = (q.givens && (q.givens.smiles || q.givens.image)) ? `
    <div class="step-given">${renderGiven(q.givens, 'mcq-g-'+q.id)}</div>` : '';

  return `
    <div class="step-body">
      ${givenHtml}
      <div class="step-prompt">${x(q.prompt||'')}</div>
      <div class="mcq-choices">${choicesHtml}</div>
      <div class="answer-block" id="mcq-ab-${q.id}">
        <div class="answer-head" id="mcq-head-${q.id}">→ Lösung</div>
        ${q.explanation ? `<div class="answer-note">${x(q.explanation)}</div>` : ''}
        <div class="answer-extra">${relatedLink(q.related_reaction_id)}</div>
      </div>
    </div>`;
}
window.pickMCQ = function(el, qid) {
  if (el.parentElement.classList.contains('locked')) return;
  el.parentElement.classList.add('locked');
  const choices = el.parentElement.querySelectorAll('.mcq-choice');
  choices.forEach(c => {
    if (c.dataset.correct === '1') c.classList.add('correct');
    else if (c === el) c.classList.add('wrong');
  });
  const ab = document.getElementById('mcq-ab-'+qid);
  if (ab) ab.style.display = 'block';
  const isCorrect = el.dataset.correct === '1';
  const head = document.getElementById('mcq-head-'+qid);
  if (head) head.textContent = isCorrect ? '✓ Richtig' : '✗ Falsch — richtige Antwort markiert';
};

function renderShortAnswer(q) {
  return `
    <div class="step-body">
      <div class="step-prompt">${x(q.prompt||'')}</div>
      <textarea class="sa-area" id="sa-${q.id}" placeholder="Antwort hier eingeben…"></textarea>
      <div style="margin-top:0.7rem;display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap">
        <button class="reveal-btn" onclick="revealSA('${q.id}')">Musterlösung anzeigen</button>
        ${relatedLink(q.related_reaction_id)}
      </div>
      <div class="sa-expected" id="sa-exp-${q.id}">
        <div class="sa-expected-head">Musterlösung</div>
        ${x(q.expected_answer||'')}
      </div>
    </div>`;
}
window.revealSA = function(qid) {
  const el = document.getElementById('sa-exp-'+qid);
  if (el) el.classList.add('open');
};

function renderMechanism(q) {
  const givenHtml = (q.givens && (q.givens.smiles || q.givens.image)) ? `
    <div class="step-given">${renderGiven(q.givens, 'm-g-'+q.id)}</div>` : '';

  const stepsHtml = (q.mech_steps||[]).map((s, i) => {
    const slot = q.id+'-m-'+i;
    return `
      <div class="mech-step" id="mech-step-${slot}">
        <div class="mech-step-head">
          <span class="mech-step-num">${i+1}</span>
          <span class="mech-step-name">${x(s.name||'')}</span>
        </div>
        <div class="mech-step-prompt">${x(s.prompt||'')}</div>
        <button class="reveal-btn" onclick="revealMech('${slot}')">Zwischenstufe anzeigen</button>
        <div class="answer-block">
          <div class="answer-head">Struktur</div>

          <div class="answer-extra">${relatedLink(q.related_reaction_id)}</div>
        </div>` : `<div style="margin-top:1rem">${relatedLink(q.related_reaction_id)}</div>`}

}
window.revealMech = function(slot) {
  const c = document.getElementById('mech-step-'+slot);
  if (c) c.classList.add('revealed');
};

/* ── Modular sections ─────────────────────────────────────────────
   A "composite" question carries `sections: []`. Each section has its
   own type + fields and is rendered independently. Sections of the
   same type don't collide because we synthesize a unique sub-question
   id by appending `__s<idx>` to the parent question's id — the
   per-type renderers use that id as their DOM-id prefix, so all
   nodes/choices/steps within one section share a private namespace.

   Supported section types: synthesis, multiple_choice, short_answer,
   mechanism, intro. Each section can optionally carry `title`
   (renders as a section header) and `body` (Markdown-light prose
   shown above the section content). The `intro` type renders only
   the prose — useful for context paragraphs between scheme parts. */

function renderSection(section, parentQid, idx) {
  if (!section || typeof section !== 'object') return '';
  const subQ = Object.assign({}, section, { id: parentQid + '__s' + idx });
  const header = (section.title || section.body) ? `
    <div class="section-header">
      ${section.title ? `<h2 class="section-title">${x(section.title)}</h2>` : ''}
      ${section.body ? `<div class="section-body">${x(section.body)}</div>` : ''}
    </div>` : '';
  let inner = '';
  switch (section.type) {
    case 'synthesis':       inner = renderSynthesis(subQ); break;
    case 'multiple_choice': inner = renderMCQ(subQ); break;
    case 'short_answer':    inner = renderShortAnswer(subQ); break;
    case 'mechanism':       inner = renderMechanism(subQ); break;
    case 'intro':           inner = ''; break; // header carries the prose
    default:                inner = `<div style="color:var(--muted);padding:1rem;font-size:0.85rem">Unbekannter Section-Typ: <code>${x(section.type||'?')}</code></div>`;
  }
  return `<section class="q-section q-section-${x(section.type||'unknown')}">${header}${inner}</section>`;
}

function showQuestion(id) {
  const q = questions.find(x => x.id === id);
  if (!q) return;
  activeId = id;

  document.querySelectorAll('.q-link').forEach(el => el.classList.remove('active'));
  const lnk = document.getElementById('link-'+id);
  if (lnk) lnk.classList.add('active');
  openSidebarFor(id);
  history.replaceState(null,'','#'+id);

  let body = '';
  if (Array.isArray(q.sections) && q.sections.length) {
    // Modular question — a list of typed sections rendered in order.
    // Each section gets a unique DOM-id prefix so multiple sections of
    // the same type don't collide.
    body = q.sections.map((sec, idx) => renderSection(sec, q.id, idx)).join('');
  } else if (q.type === 'synthesis')       body = renderSynthesis(q);
  else if (q.type === 'multiple_choice') body = renderMCQ(q);
  else if (q.type === 'short_answer')    body = renderShortAnswer(q);
  else if (q.type === 'mechanism')       body = renderMechanism(q);
  else body = `<div style="padding:2rem;color:var(--muted)">Unbekannter Fragentyp: ${x(q.type||'?')}</div>`;

  const hintsHtml = (q.hints && q.hints.length) ? `
    <div class="q-hints" id="hints-block">
      <div class="q-hints-head" onclick="document.getElementById('hints-block').classList.toggle('open')">
        <span class="hh-arrow">▶</span>
        <span>Hinweise (${q.hints.length})</span>
      </div>
      <div class="q-hints-body">
        <ul>${q.hints.map(h => `<li>${x(h)}</li>`).join('')}</ul>
      </div>
    </div>` : '';

  document.getElementById('main').innerHTML = `
    <div class="q-page">
      <div class="q-breadcrumb">
        <span class="cat-name">${x(q.category)}</span>
        <span class="sep">›</span>
        <span>${x(q.name)}</span>
        <span class="sep">·</span>
        <span class="q-type-badge">${TYPE_LABEL[q.type]||q.type||'?'}</span>
        ${q.difficulty ? `<span class="diff-badge diff-${q.difficulty}">${q.difficulty}</span>` : ''}
      </div>
      <h1 class="q-title">${x(q.name)}</h1>
      ${q.source ? `<div class="q-source">${x(q.source)}</div>` : ''}
      ${q.intro ? `<div class="q-intro">${x(q.intro)}</div>` : ''}
      ${hintsHtml}
      ${body}
    </div>`;

  document.getElementById('main').scrollTop = 0;
}
window.showQuestion = showQuestion;

function globalSearch(qstr) {
  const s = qstr.toLowerCase().trim();
  document.querySelectorAll('.cat-group').forEach(group => {
    const links = group.querySelectorAll('.q-link');
    let any = false;
    links.forEach(link => {
      const id  = link.id.replace('link-','');
      const q   = questions.find(x => x.id === id);
      const hit = !s
        || q.name.toLowerCase().includes(s)
        || (q.category||'').toLowerCase().includes(s)
        || (q.type||'').toLowerCase().includes(s)
        || (TYPE_GROUP_LABEL[qPrimaryType(q)]||'').toLowerCase().includes(s)
        || (q.intro||'').toLowerCase().includes(s);
      link.classList.toggle('hidden', !hit);
      if (hit) any = true;
    });
    group.style.display = any ? '' : 'none';
    const header = group.querySelector('.cat-header');
    if (s && any) header.classList.add('open');
  });
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}

// Keep --header-h CSS var in sync with the actual rendered header height.
// Without this, the sidebar drawer top + the layout height calc drift apart
// whenever the header wraps differently (e.g. small phones, tablet rotation).
function syncHeaderHeight() {
  const h = document.querySelector('header');
  if (!h) return;
  document.documentElement.style.setProperty('--header-h', h.offsetHeight + 'px');
}
window.addEventListener('resize', syncHeaderHeight);
window.addEventListener('orientationchange', syncHeaderHeight);
if (window.ResizeObserver) {
  new ResizeObserver(syncHeaderHeight).observe(document.querySelector('header'));
} else {
  document.addEventListener('DOMContentLoaded', syncHeaderHeight);
}
syncHeaderHeight();

function showError(msg) {
  document.getElementById('main').innerHTML = `
    <div style="padding:3rem;text-align:center;color:var(--red)">
      <div style="font-size:2rem;margin-bottom:1rem">⚠</div>
      <div>${msg}</div>
    </div>`;
}

init();
</script>
</body>
</html>
